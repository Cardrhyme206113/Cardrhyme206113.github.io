name: Audit flow system

on:
  push:
    paths:
      - .github/trigger-audit-flow-system.txt

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Produce flow audit
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          text=Path('simbers.html').read_text(encoding='utf-8').splitlines()
          keys=('flow','Flow','direction','Direction','reverse','Reverse','wrist','Wrist','cutDirection','usedFlowCount')
          hits=[]
          for i,line in enumerate(text,1):
              if any(k in line for k in keys):
                  hits.append(i)
          ranges=[]
          for i in hits:
              start=max(1,i-18); end=min(len(text),i+28)
              if ranges and start <= ranges[-1][1]+3:
                  ranges[-1]=(ranges[-1][0],max(ranges[-1][1],end))
              else:
                  ranges.append((start,end))
          out=[]
          out.append(f'line_count={len(text)}')
          out.append(f'hit_count={len(hits)}')
          for start,end in ranges:
              out.append(f'\n===== LINES {start}-{end} =====')
              out.extend(f'{n:05d}: {text[n-1]}' for n in range(start,end+1))
          Path('flow-system-audit.txt').write_text('\n'.join(out),encoding='utf-8')
          PY

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/trigger-audit-flow-system.txt
          git add flow-system-audit.txt
          git commit -m "Audit built-in flow system"
          git push
