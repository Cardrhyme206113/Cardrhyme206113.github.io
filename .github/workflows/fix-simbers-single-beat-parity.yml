name: Enforce Simbers wrist parity

on:
  push:
    paths:
      - .github/workflows/fix-simbers-single-beat-parity.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            simbers.html
            .github/workflows/fix-simbers-single-beat-parity.yml
      - name: Enforce reverse cuts and safe compound bridges
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p=Path('simbers.html')
          s=p.read_text()

          if 'function parityFilteredOptions' not in s:
            marker='''function parityPenalty(previous,direction,time){'''
            helper='''function parityFilteredOptions(options,previous,boundaryTarget){
              if(boundaryTarget)return [boundaryTarget];
              if(!previous)return options;
              const target=oppositeDirection(previous.direction);
              if(options.includes(target))return [target];
              const ranked=options
                .filter(direction=>direction!==previous.direction)
                .sort((a,b)=>
                  angleDistance(CUT[a].deg,CUT[target].deg)-
                  angleDistance(CUT[b].deg,CUT[target].deg)
                );
              return ranked.length?[ranked[0]]:[target];
            }
            '''+marker
            if marker not in s:raise RuntimeError('parity helper marker')
            s=s.replace(marker,helper,1)

          parity=re.compile(r'function parityPenalty\(previous,direction,time\)\{.*?\n\}',re.S)
          replacement='''function parityPenalty(previous,direction,time){
            const d=CUT[direction];
            if(!previous)return d.dy<-.15?0:(Math.abs(d.dx)>.9?2.2:1.2);
            if(direction===previous.direction)return 1e9;
            const dt=Math.max(.05,time-previous.time);
            const expected=(CUT[previous.direction].deg+180)%360;
            const error=angleDistance(d.deg,expected);
            let score=error/5;
            if(error>90)score+=250;
            else if(error>45)score+=45;
            else if(error>22.5)score+=12;
            if(dt<.55&&error>45)score+=80;
            return score;
          }'''
          s,n=parity.subn(replacement,s,count=1)
          if n!=1:raise RuntimeError('parity penalty')

          options=re.compile(
            r'\n  if\(boundaryTargets\?\.left\)\{\n    leftOptions=\[boundaryTargets\.left\];\n  \}\n  if\(boundaryTargets\?\.right\)\{\n    rightOptions=\[boundaryTargets\.right\];\n  \}',
            re.S
          )
          if 'leftOptions=parityFilteredOptions(' not in s:
            s,n=options.subn('''
            leftOptions=parityFilteredOptions(
              leftOptions,
              previous.left,
              boundaryTargets?.left
            );
            rightOptions=parityFilteredOptions(
              rightOptions,
              previous.right,
              boundaryTargets?.right
            );''',s,count=1)
            if n!=1:raise RuntimeError('direction options')

          if 'function compoundEntryMatchesPrevious' not in s:
            marker='''function retunePreviousForCompound(
            generatedNotes,
            previous,
            steps,
            startTime
          ){'''
            helper='''function compoundEntryMatchesPrevious(previous,steps){
              const hands=[
                {key:"left",step:explicitHandStep(steps,"l")},
                {key:"right",step:explicitHandStep(steps,"r")}
              ];
              for(const hand of hands){
                if(!hand.step)continue;
                const target=oppositeDirection(hand.step.note[2]);
                if(!previous[hand.key]||previous[hand.key].direction!==target){
                  return false;
                }
              }
              return true;
            }

            '''+marker
            if marker not in s:raise RuntimeError('entry compatibility marker')
            s=s.replace(marker,helper,1)

          s=s.replace(
            '  let lastWasCompound=false;\n  let boundaryTargets={left:null,right:null};',
            '  let lastWasCompound=false;\n  let lastNormalBridgesCompound=false;\n  let boundaryTargets={left:null,right:null};',
            1
          )
          if 'let lastNormalBridgesCompound=false;' not in s:raise RuntimeError('bridge state')

          old='''      // Keep explicit streams separated by at least one ordinary flow so the
                // exit reversal from one stream can become the entry reversal of the next.
                if(lastWasCompound||!compoundWindow){'''
          new='''      // Never let one bridge note get retuned to satisfy two incompatible
                // explicit flows. Add another normal note unless both hand reversals match.
                const bridgeConflict=
                  lastNormalBridgesCompound &&
                  !compoundEntryMatchesPrevious(previous,pattern.steps);
                if(lastWasCompound||bridgeConflict||!compoundWindow){'''
          if old in s:s=s.replace(old,new,1)
          elif 'const bridgeConflict=' not in s:raise RuntimeError('bridge guard')

          old='''    const chosen=chooseDirections(
              pattern,
              previous,
              `${seed}|${config.id}|${cluster}|${i}`,
              time,
              boundaryTargets
            );
            boundaryTargets={left:null,right:null};'''
          new='''    const usedBoundaryBridge=Boolean(
              boundaryTargets.left||boundaryTargets.right
            );
            const chosen=chooseDirections(
              pattern,
              previous,
              `${seed}|${config.id}|${cluster}|${i}`,
              time,
              boundaryTargets
            );
            boundaryTargets={left:null,right:null};'''
          if old in s:s=s.replace(old,new,1)
          elif 'const usedBoundaryBridge=Boolean(' not in s:raise RuntimeError('bridge capture')

          old='''      flowTierCounts[pattern.difficulty]++;
                lastWasCompound=true;'''
          new='''      flowTierCounts[pattern.difficulty]++;
                lastWasCompound=true;
                lastNormalBridgesCompound=false;'''
          if old in s:s=s.replace(old,new,1)
          elif 'lastWasCompound=true;\n      lastNormalBridgesCompound=false;' not in s:raise RuntimeError('compound reset')

          old='''    flowTierCounts[pattern.difficulty]++;
            lastWasCompound=false;'''
          new='''    flowTierCounts[pattern.difficulty]++;
            lastWasCompound=false;
            lastNormalBridgesCompound=usedBoundaryBridge;'''
          if old in s:s=s.replace(old,new,1)
          elif 'lastNormalBridgesCompound=usedBoundaryBridge;' not in s:raise RuntimeError('normal bridge state')

          p.write_text(s)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add simbers.html
          git diff --cached --quiet || git commit -m "Enforce reverse wrist parity between flows"
          git push
