name: Fix Simbers exact flow timestamps

on:
  push:
    paths:
      - .github/workflows/fix-simbers-single-beat-parity.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            simbers.html
            simbers-flow-library.js
            .github/workflows/fix-simbers-single-beat-parity.yml
      - name: Patch exact timestamps
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          js_path=Path('simbers-flow-library.js')
          js=js_path.read_text()
          specs={
            'library_05':'[0,0,0]',
            'library_06':'[0,0,0]',
            'library_13':'[0,0,0,1,1]',
            'library_14':'[0,0,0]',
            'library_15':'[0,0]',
            'library_16':'[0,0,0]',
            'library_17':'[0,0,0]',
            'library_18':'[0,0,0]',
            'library_19':'[0,0,0]'
          }
          for flow_id,beats in specs.items():
            if re.search(rf'"id":"{flow_id}"[^}}]*"stepBeats":',js):
              continue
            js,n=re.subn(
              rf'("id":"{flow_id}".*?"spanBeats":\d+)(,"steps":)',
              rf'\1,"stepBeats":{beats}\2',
              js,
              count=1
            )
            if n!=1: raise RuntimeError(flow_id)
          js_path.write_text(js)

          p=Path('simbers.html')
          s=p.read_text()
          old='''function compoundFlowWindow(segments,index,pattern,duration){
            const span=Math.max(1,pattern.beatSpan||1);
            const endSegment=segments[index+span];
            if(!endSegment)return null;

            const start=segments[index].start;
            const end=Math.min(duration-.02,endSegment.start);
            const total=end-start;
            if(total<=0)return null;

            const spacing=total/pattern.steps.length;
            // Do not squeeze dense explicit streams into unreadably tiny gaps.
            if(spacing<.055)return null;

            return {start,end,total,spacing,span};
          }'''
          new='''function compoundFlowWindow(segments,index,pattern,duration){
            const span=Math.max(1,pattern.beatSpan||1);
            const endSegment=segments[index+span];
            if(!endSegment)return null;

            const start=segments[index].start;
            const end=Math.min(duration-.02,endSegment.start);
            const total=end-start;
            if(total<=0)return null;

            const spacing=total/pattern.steps.length;
            if(!Array.isArray(pattern.stepBeats)&&spacing<.055)return null;
            const beatTimes=Array.from(
              {length:span},
              (_,offset)=>segments[index+offset]?.start ?? start+total*offset/span
            );
            return {start,end,total,spacing,span,beatTimes};
          }

          function compoundStepPlacement(window,pattern,stepIndex,baseEventIndex){
            if(Array.isArray(pattern.stepBeats)){
              const beatOffset=clamp(
                Math.round(pattern.stepBeats[stepIndex]??0),
                0,
                window.span-1
              );
              return {
                time:+window.beatTimes[beatOffset].toFixed(4),
                eventIndex:baseEventIndex+beatOffset
              };
            }
            return {
              time:+(window.start+window.spacing*stepIndex).toFixed(4),
              eventIndex:baseEventIndex+window.span*stepIndex/pattern.steps.length
            };
          }'''
          if old in s:s=s.replace(old,new,1)
          elif 'function compoundStepPlacement' not in s:raise RuntimeError('window')

          old='''        const step=pattern.steps[stepIndex];
                  const time=+(
                    compoundWindow.start+
                    compoundWindow.spacing*stepIndex
                  ).toFixed(4);
                  const eventIndex=
                    i+
                    compoundWindow.span*
                    stepIndex/
                    pattern.steps.length;'''
          new='''        const step=pattern.steps[stepIndex];
                  const {time,eventIndex}=compoundStepPlacement(
                    compoundWindow,
                    pattern,
                    stepIndex,
                    i
                  );'''
          if old in s:s=s.replace(old,new,1)
          elif 'const {time,eventIndex}=compoundStepPlacement' not in s:raise RuntimeError('step')

          old='''        const lastTime=+(
                    compoundWindow.start+
                    compoundWindow.spacing*leftExit.index
                  ).toFixed(4);'''
          new='''        const {time:lastTime}=compoundStepPlacement(
                    compoundWindow,
                    pattern,
                    leftExit.index,
                    i
                  );'''
          if old in s:s=s.replace(old,new,1)
          elif 'leftExit.index,\n            i' not in s:raise RuntimeError('left')

          old='''        const lastTime=+(
                    compoundWindow.start+
                    compoundWindow.spacing*rightExit.index
                  ).toFixed(4);'''
          new='''        const {time:lastTime}=compoundStepPlacement(
                    compoundWindow,
                    pattern,
                    rightExit.index,
                    i
                  );'''
          if old in s:s=s.replace(old,new,1)
          elif 'rightExit.index,\n            i' not in s:raise RuntimeError('right')
          p.write_text(s)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add simbers.html simbers-flow-library.js
          git diff --cached --quiet || git commit -m "Make requested flows use exact beat timestamps"
          git push
