name: Finish Simbers 50-flow integration

on:
  push:
    paths:
      - .github/workflows/patch-simbers-flows.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            simbers.html
            simbers-flow-library.html
            simbers-flow-library.js
            .github/workflows/patch-simbers-flows.yml

      - name: Link the logo and align the library page
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          simbers = Path("simbers.html")
          text = simbers.read_text(encoding="utf-8")

          # Preserve the modular 20-sequence implementation already in the repo.
          required = [
              'import { SEQUENCE_FLOW_PATTERNS } from "./simbers-flow-library.js";',
              'explicitHandStep(steps,key,fromEnd=false)',
              'if(lastWasCompound||!compoundWindow)',
              'boundaryTargets.left=oppositeDirection(leftExit.note[2])',
              'boundaryTargets.right=oppositeDirection(rightExit.note[2])'
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise RuntimeError("Current wrist-safe sequence implementation is incomplete: " + ", ".join(missing))

          if 'href="./simbers-flow-library.html"' not in text:
              pattern = re.compile(
                  r'<div class="brandMark" aria-hidden="true">\s*'
                  r'<span></span><span></span>\s*</div>'
              )
              replacement = (
                  '<a class="brandMark" href="./simbers-flow-library.html" '
                  'aria-label="Open the 50-flow library" title="Open flow library">'
                  '<span></span><span></span></a>'
              )
              text, count = pattern.subn(replacement, text, count=1)
              if count != 1:
                  raise RuntimeError("Could not make the Simplified Sabers logo clickable.")
              simbers.write_text(text, encoding="utf-8")

          library = Path("simbers-flow-library.html")
          page = library.read_text(encoding="utf-8")
          replacements = {
              '<strong>18 · 36%</strong><span>Medium</span>': '<strong>19 · 38%</strong><span>Medium</span>',
              '<strong>20 · 40%</strong><span>Hard</span>': '<strong>19 · 38%</strong><span>Hard</span>',
              'data-filter="medium">Medium 18': 'data-filter="medium">Medium 19',
              'data-filter="hard">Hard 20': 'data-filter="hard">Hard 19',
              '"id":"compound_02","name":"Flow 2","difficulty":"hard"': '"id":"compound_02","name":"Flow 2","difficulty":"medium"',
              '"id":"compound_04","name":"Flow 4","difficulty":"hard"': '"id":"compound_04","name":"Flow 4","difficulty":"medium"',
              '"id":"compound_15","name":"Flow 15","difficulty":"medium"': '"id":"compound_15","name":"Flow 15","difficulty":"hard"'
          }
          for old, new in replacements.items():
              page = page.replace(old, new)
          if '"index":50' not in page or 'Spiral Switchback' not in page:
              raise RuntimeError("The HTML library does not contain all 50 flows.")
          library.write_text(page, encoding="utf-8")
          PY

      - name: Commit final integration
        shell: bash
        run: |
          if git diff --quiet -- simbers.html simbers-flow-library.html; then
            echo "The integration is already complete."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add simbers.html simbers-flow-library.html
          git commit -m "Link Simbers to the complete 50-flow library"
          git push
