name: Patch Simbers on update PR

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Apply ArcViewer integration
        shell: bash
        run: |
          set -euo pipefail
          if grep -q 'SIMPLIFIED_SABERS_LOAD_MAP' simbers.html; then
            echo "Already updated."
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/update-simbers-arcviewer.yml').read_text(encoding='utf-8')
          marker = "cat > /tmp/simbers.patch <<'PATCH'\n"
          patch = workflow.split(marker, 1)[1].split("\nPATCH\n", 1)[0]
          Path('/tmp/simbers.patch').write_text(patch + '\n', encoding='utf-8')
          PY

          git apply --check /tmp/simbers.patch
          git apply /tmp/simbers.patch

      - name: Commit to PR branch
        shell: bash
        run: |
          if git diff --quiet -- simbers.html; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add simbers.html
          git commit -m "Add automatic ArcViewer preview to Simbers"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
