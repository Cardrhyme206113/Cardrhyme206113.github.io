name: Add built-in sequence flows

on:
  push:
    paths:
      - .github/trigger-add-sequence-flows.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Apply sequence flow patch
        run: python .github/scripts/add_sequence_flows.py

      - name: Validate JavaScript and flow library
        shell: bash
        run: |
          cp simbers-flow-library.js /tmp/simbers-flow-library.mjs
          node --check /tmp/simbers-flow-library.mjs
          python - <<'PY'
          from pathlib import Path
          import re
          text=Path('simbers.html').read_text(encoding='utf-8')
          modules=[m.group(1) for m in re.finditer(r'<script\s+type="module"[^>]*>(.*?)</script>',text,re.S)]
          if len(modules)!=1:
              raise SystemExit(f'Expected one app module, found {len(modules)}')
          Path('/tmp/simbers-main.mjs').write_text(modules[0],encoding='utf-8')
          library=Path('simbers-flow-library.js').read_text(encoding='utf-8')
          if library.count('"id":"library_')!=19:
              raise SystemExit('Expected 19 sequence flow IDs')
          for needle in (
              '"id":"library_05"', '"spanBeats":1',
              '"id":"library_13"', '"spanBeats":2',
              '"id":"library_19"'
          ):
              if needle not in library:
                  raise SystemExit(f'Missing flow timing marker: {needle}')
          PY
          node --check /tmp/simbers-main.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/trigger-add-sequence-flows.txt
          git add -A
          git commit -m "Add explicit multi-beat flow library"
          git push
