name: Fix Info.dat characteristic manifest

on:
  push:
    paths:
      - .github/trigger-info-characteristic-fix.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply Info.dat patch
        run: python .github/scripts/assert_characteristics_in_info.py

      - name: Validate JavaScript
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text=Path('simbers.html').read_text(encoding='utf-8')
          scripts=[m.group(1) for m in re.finditer(r'<script(?:\s+[^>]*)?>(.*?)</script>',text,re.S) if m.group(1).strip()]
          Path('/tmp/simbers.js').write_text('\n'.join(scripts),encoding='utf-8')
          PY
          node --check /tmp/simbers.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/trigger-info-characteristic-fix.txt
          git add simbers.html
          git commit -m "Validate and expose generated map characteristics"
          git push
