name: Create simbers2

on:
  push:
    paths:
      - .github/run-s2.txt

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Create page
        run: python .github/scripts/make_simbers2.py
      - name: Validate JavaScript
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text=Path('simbers2.html').read_text(encoding='utf-8')
          scripts=[m.group(1) for m in re.finditer(r'<script\s+type="module"[^>]*>(.*?)</script>',text,re.S)]
          if len(scripts)!=1:
              raise SystemExit(f'Expected one module script, found {len(scripts)}')
          Path('/tmp/simbers2.mjs').write_text(scripts[0],encoding='utf-8')
          for marker in ('beatsaver-viewer/simbers-viewer.html','mode:"Standard"','difficulty:"ExpertPlus"'):
              if marker not in text:
                  raise SystemExit(f'Missing {marker}')
          PY
          node --check /tmp/simbers2.mjs
      - name: Commit page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/run-s2.txt
          git add simbers2.html
          git commit -m "Add lightweight 3D viewer version of Simplified Sabers"
          git push
