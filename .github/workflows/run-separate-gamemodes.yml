name: Separate NoArrows and OneSaber modes

on:
  push:
    paths:
      - .github/trigger-separate-gamemodes.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply characteristic patch
        shell: bash
        run: |
          set +e
          python .github/scripts/separate_noarrows_onesaber_modes.py > /tmp/patch.log 2>&1
          status=$?
          cat /tmp/patch.log
          if [ $status -ne 0 ]; then
            cp /tmp/patch.log .github/separate-gamemodes-error.txt
            git add .github/separate-gamemodes-error.txt
            git commit -m "Record separate gamemode patch failure"
            git push
            exit $status
          fi

      - name: Validate JavaScript
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text=Path('simbers.html').read_text(encoding='utf-8')
          scripts=[m.group(1) for m in re.finditer(r'<script(?:\s+[^>]*)?>(.*?)</script>',text,re.S) if m.group(1).strip()]
          Path('/tmp/simbers.js').write_text('\n'.join(scripts),encoding='utf-8')
          PY
          if ! node --check /tmp/simbers.js > /tmp/node-check.log 2>&1; then
            cat /tmp/node-check.log
            cp /tmp/node-check.log .github/separate-gamemodes-error.txt
            git add .github/separate-gamemodes-error.txt
            git commit -m "Record separate gamemode JavaScript failure"
            git push
            exit 1
          fi

      - name: Commit changes
        run: |
          git rm .github/trigger-separate-gamemodes.txt
          git add simbers.html
          git commit -m "Generate NoArrows and OneSaber as separate modes"
          git push
