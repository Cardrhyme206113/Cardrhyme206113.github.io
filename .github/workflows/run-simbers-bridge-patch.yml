name: Run Simbers compound bridge patch

on:
  push:
    paths:
      - .github/workflows/run-simbers-bridge-patch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: python tools/patch_simbers_compound_bridges.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add simbers.html
          git diff --cached --quiet || git commit -m "Prevent incompatible compound flow bridges"
          git push
