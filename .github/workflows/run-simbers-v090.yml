name: Apply Simbers v0.9.0 diagnostics

on:
  push:
    paths:
      - .github/workflows/run-simbers-v090.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: python tools/run_patch_simbers_v090.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add simbers.html simbers-flow-library.js simbers-flow-library.html tools/v090-debug.txt
          git diff --cached --quiet || git commit -m "Apply or diagnose Simbers v0.9.0"
          git push
