name: Test Flow Mapmaker Copy

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Validate copied assets
        run: |
          test -f flow-mapmaker-v1/index.html
          test -f flow-mapmaker-v1/mapmaker.html
          test -f flow-mapmaker-v1/launcher-v2.js
          test -f flow-mapmaker-v1/flow-library-data.js
          test -f flow-mapmaker-v1/flow-library.html
          test -f flow-mapmaker-v1/simbers-ogg-encoder.js
          test ! -e flow-mapmaker-v1/launcher.js
          grep -q 'launcher-v2.js' flow-mapmaker-v1/index.html
          grep -q 'ArcViewer-simtest' flow-mapmaker-v1/mapmaker.html
          grep -q 'EXCLUSIVE_FLOW_LIBRARY=await' flow-mapmaker-v1/flow-library-data.js
          node --input-type=module --check < flow-mapmaker-v1/launcher-v2.js
          node --input-type=module --check < flow-mapmaker-v1/flow-library-data.js

      - name: Install Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --save-dev playwright@1.52.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null

      - name: Browser smoke test
        run: |
          python3 -m http.server 4173 >/tmp/flow-copy-server.log 2>&1 &
          sleep 2
          cat > test-flow-copy.mjs <<'EOF'
          import { chromium } from 'playwright';

          const browser=await chromium.launch({headless:true});
          const page=await browser.newPage({viewport:{width:1280,height:800}});
          const errors=[];
          page.on('pageerror',error=>errors.push(`pageerror: ${error.stack||error.message}`));
          page.on('console',message=>{if(message.type()==='error')errors.push(`console: ${message.text()}`)});
          page.on('requestfailed',request=>{
            const url=request.url();
            if(!url.includes('ArcViewer-simtest'))errors.push(`requestfailed: ${url} :: ${request.failure()?.errorText}`);
          });

          await page.goto('http://127.0.0.1:4173/flow-mapmaker-v1/',{waitUntil:'domcontentloaded',timeout:120000});
          await page.waitForFunction(()=>document.body.innerText.includes('FLOW COPY v1.0.0'),null,{timeout:30000});
          const body=await page.locator('body').innerText();
          if(!body.includes('SIMPLIFIED SABERS'))errors.push('Mapmaker UI did not render.');
          if(!body.includes('20 multi-beat flows'))errors.push('Expanded flow count is not shown.');
          if(!body.includes('20 FLOWS'))errors.push('Flow-copy badge is missing.');
          if(body.includes('failed to initialize'))errors.push(body.slice(0,1600));
          if(await page.locator('a.brandMark[href="./flow-library.html"]').count()!==1)errors.push('Copied logo does not link to its flow library.');

          await page.locator('a.brandMark').click();
          await page.waitForLoadState('domcontentloaded');
          await page.waitForSelector('.flow',{timeout:30000});
          const flowCount=await page.locator('.flow').count();
          const variantCount=await page.locator('.variant').count();
          if(flowCount!==20)errors.push(`Expected 20 flows, got ${flowCount}.`);
          if(variantCount!==80)errors.push(`Expected 80 variants, got ${variantCount}.`);

          await page.goto('http://127.0.0.1:4173/flow-mapmaker-v1/',{waitUntil:'domcontentloaded',timeout:120000});
          await page.waitForFunction(()=>document.body.innerText.includes('FLOW COPY v1.0.0'),null,{timeout:30000});
          await page.locator('#demoBtn').click();
          await page.waitForFunction(()=>!document.querySelector('#analyzeBtn')?.disabled,null,{timeout:10000});
          await page.locator('#analyzeBtn').click();
          await page.waitForFunction(()=>{
            const status=document.querySelector('#mapStatus')?.textContent||'';
            const exportButton=document.querySelector('#viewerDownload');
            return !exportButton?.disabled && (/Done|Map created|Ready to preview/i.test(status));
          },null,{timeout:120000});
          const finalStatus=await page.locator('#mapStatus').innerText();
          if(/failed|error/i.test(finalStatus))errors.push(`Map generation status: ${finalStatus}`);
          await page.screenshot({path:'/tmp/flow-mapmaker-copy.png',fullPage:true});
          await browser.close();
          if(errors.length){console.error(errors.join('\n\n'));process.exit(1)}
          EOF
          node test-flow-copy.mjs

      - name: Upload screenshot and server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flow-mapmaker-copy-test
          path: |
            /tmp/flow-mapmaker-copy.png
            /tmp/flow-copy-server.log
          if-no-files-found: ignore
