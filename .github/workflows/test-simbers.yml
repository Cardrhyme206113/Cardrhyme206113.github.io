name: Test Simbers

on:
  push:
    branches: [simbers-dev]
    paths:
      - simbers.html
      - simbers-v093.js
      - simbers-v094.js
      - simbers-v095.js
      - simbers-flow-library.js
      - .github/workflows/test-simbers.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Static syntax checks
        run: |
          node --check simbers-v093.js
          node --check simbers-v094.js
          node --check simbers-v095.js
          node --check simbers-flow-library.js

      - name: Install Chromium test runtime
        run: |
          npm init -y >/dev/null 2>&1
          npm install --save-dev playwright@1.52.0 >/dev/null
          npx playwright install --with-deps chromium >/dev/null

      - name: Run local site
        run: |
          python3 -m http.server 4173 > /tmp/simbers-server.log 2>&1 &
          echo $! > /tmp/simbers-server.pid
          sleep 2
          curl --fail http://127.0.0.1:4173/simbers.html >/dev/null

      - name: Browser smoke test
        run: |
          cat > /tmp/test-simbers.mjs <<'EOF'
          import { chromium } from 'playwright';

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1280, height: 800 } });
          const errors = [];
          page.on('pageerror', error => errors.push(`pageerror: ${error.stack || error.message}`));
          page.on('console', message => {
            if (message.type() === 'error') errors.push(`console: ${message.text()}`);
          });
          page.on('requestfailed', request => errors.push(`requestfailed: ${request.url()} :: ${request.failure()?.errorText}`));

          const response = await page.goto('http://127.0.0.1:4173/simbers.html?build=ci', {
            waitUntil: 'domcontentloaded',
            timeout: 120000
          });
          if (!response?.ok()) errors.push(`HTTP status: ${response?.status()}`);

          await page.waitForTimeout(8000);
          const body = await page.locator('body').innerText();
          const title = await page.title();

          console.log('TITLE:', title);
          console.log('BODY_START:', body.slice(0, 1000));

          if (body.includes('failed to load')) errors.push(`Visible loader failure: ${body.slice(0, 1200)}`);
          if (!body.includes('SIMPLIFIED SABERS')) errors.push('Main Simplified Sabers UI did not render.');
          if (!body.includes('UPLOAD SONG')) errors.push('Upload Song control did not render.');
          if (!body.includes('v0.9.5')) errors.push('Visible v0.9.5 marker did not render.');

          await page.screenshot({ path: '/tmp/simbers-test.png', fullPage: true });
          await browser.close();

          if (errors.length) {
            console.error(errors.join('\n\n'));
            process.exit(1);
          }
          EOF
          node /tmp/test-simbers.mjs

      - name: Upload screenshot and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simbers-browser-test
          path: |
            /tmp/simbers-test.png
            /tmp/simbers-server.log
          if-no-files-found: ignore
