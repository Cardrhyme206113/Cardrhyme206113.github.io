name: Update Simbers ArcViewer integration

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/update-simbers-arcviewer.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-simbers:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Add embedded ArcViewer preview
        shell: bash
        run: |
          set -euo pipefail

          if grep -q 'SIMPLIFIED_SABERS_LOAD_MAP' simbers.html; then
            echo "simbers.html is already updated."
            exit 0
          fi

          cat > /tmp/simbers.patch <<'PATCH'
--- a/simbers.html
