<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="flow-showcase-version" content="1.0.0">
<title>All Flow Showcase · 50 BPM</title>
<style>
:root{--bg:#05070b;--panel:rgba(11,14,21,.88);--line:#2b3444;--text:#f4f7ff;--muted:#94a0b4}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}
canvas{display:block;width:100%;height:100%;touch-action:none}.hud{position:fixed;inset:0;pointer-events:none}
.top{position:absolute;left:14px;right:14px;top:max(12px,env(safe-area-inset-top));display:flex;gap:10px;align-items:flex-start;justify-content:space-between}
.card{border:1px solid rgba(125,150,190,.28);border-radius:13px;background:var(--panel);box-shadow:0 10px 38px rgba(0,0,0,.38);backdrop-filter:blur(15px)}
.now{padding:11px 13px;max-width:min(680px,72vw)}.kicker{font:800 10px ui-monospace,monospace;color:#84bfff;letter-spacing:.09em}
.now h1{font-size:18px;margin:4px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.now p{font-size:11px;color:var(--muted);margin:4px 0 0}
.stats{display:flex;gap:7px;padding:9px;flex-wrap:wrap;justify-content:flex-end;max-width:44vw}.pill{padding:6px 8px;border-radius:999px;background:#151b26;color:#cbd5e5;font:800 10px ui-monospace,monospace}
.bottom{position:absolute;left:12px;right:12px;bottom:max(12px,env(safe-area-inset-bottom));display:flex;gap:9px;align-items:center;pointer-events:auto}
.controls{padding:9px;display:flex;gap:7px;align-items:center;flex:1}button,a.button{min-height:40px;border:1px solid var(--line);border-radius:9px;padding:0 12px;display:inline-grid;place-items:center;background:#151a24;color:#f6f8fc;text-decoration:none;font-weight:850;cursor:pointer}
button.primary{background:#1678dc;border-color:#2896ff}button.active{border-color:#72c8ff;color:#9ddaff}input[type=range]{min-width:100px;flex:1}.time{min-width:88px;text-align:right;color:#aab5c8;font:800 10px ui-monospace,monospace}
.sound{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);padding:16px 18px;text-align:center;pointer-events:auto;cursor:pointer;max-width:330px}.sound strong{display:block;font-size:16px}.sound span{display:block;margin-top:5px;color:var(--muted);font-size:11px;line-height:1.45}.sound.hidden{display:none}
.flash{position:absolute;inset:0;background:white;opacity:0;pointer-events:none}
@media(max-width:720px){.top{flex-direction:column}.stats{max-width:100%;justify-content:flex-start}.now{max-width:100%}.bottom{align-items:stretch}.controls{flex-wrap:wrap}input[type=range]{order:10;flex-basis:100%}.time{margin-left:auto}a.button{display:none}}
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="hud">
  <div class="top">
    <section class="card now">
      <div class="kicker">FLOW SHOWCASE v1.0.0 · 50 BPM</div>
      <h1 id="sectionTitle">Loading all 80 alternatives…</h1>
      <p id="sectionMeta">822 notes · 9:31 · automatic visual playback</p>
    </section>
    <section class="card stats">
      <span class="pill" id="beatPill">BEAT 0</span>
      <span class="pill" id="comboPill">AUTO ×0</span>
      <span class="pill" id="speedPill">1×</span>
    </section>
  </div>
  <div class="sound card" id="soundGate">
    <strong>Autoplay started</strong>
    <span>Tap once to enable the simple 50 BPM “tık tık” rhythm. Browsers block sound before a gesture.</span>
  </div>
  <div class="bottom">
    <section class="card controls">
      <button class="primary" id="playButton">Pause</button>
      <button id="restartButton">Restart</button>
      <button class="active speedButton" data-speed="1">1×</button>
      <button class="speedButton" data-speed="2">2×</button>
      <button class="speedButton" data-speed="4">4×</button>
      <input id="seek" type="range" min="0" max="1000" value="0" aria-label="Seek">
      <span class="time" id="timeLabel">0:00 / 9:31</span>
      <a class="button" id="downloadMap" href="#" download="Flow_Showcase_50BPM.zip">Download map ZIP</a>
    </section>
  </div>
  <div class="flash" id="flash"></div>
</div>
<script src="./flow-showcase-map.js"></script>
<script src="./flow-showcase-zip-1.js"></script>
<script src="./flow-showcase-zip-2.js"></script>
<script src="./flow-showcase-zip-3.js"></script>
<script src="./flow-showcase-zip-4.js"></script>
<script>
const raw=window.FLOW_SHOWCASE_MAP;
const map={
  bpm:raw.b,duration:raw.t,
  notes:raw.n.map(([b,x,y,c,d,k])=>({b,x,y,c,d,connector:!!k})),
  sections:raw.s.map(([index,flowIndex,flowName,alternative,alternativeName,startBeat,endBeat,noteCount])=>({index,flowIndex,flowName,alternative,alternativeName,startBeat,endBeat,noteCount}))
};
const canvas=document.getElementById("scene"),ctx=canvas.getContext("2d");
const soundGate=document.getElementById("soundGate"),playButton=document.getElementById("playButton"),restartButton=document.getElementById("restartButton"),seek=document.getElementById("seek"),timeLabel=document.getElementById("timeLabel"),sectionTitle=document.getElementById("sectionTitle"),sectionMeta=document.getElementById("sectionMeta"),beatPill=document.getElementById("beatPill"),comboPill=document.getElementById("comboPill"),speedPill=document.getElementById("speedPill"),flash=document.getElementById("flash");
let running=true,soundEnabled=false,speed=1,virtualTime=0,lastFrame=performance.now(),lastHitIndex=-1,combo=0,cssWidth=0,cssHeight=0,dpr=1,audioContext=null,lastTickBeat=-1;
const approachBeats=6,arrowGlyph=["↑","↓","←","→","↖","↗","↙","↘"],sectionStartSet=new Set(map.sections.map(section=>Math.round(section.startBeat)));
function resize(){dpr=Math.min(devicePixelRatio||1,2);cssWidth=innerWidth;cssHeight=innerHeight;canvas.width=Math.round(cssWidth*dpr);canvas.height=Math.round(cssHeight*dpr);ctx.setTransform(dpr,0,0,dpr,0,0)}
addEventListener("resize",resize);resize();
function fmt(seconds){seconds=Math.max(0,Math.floor(seconds));return `${Math.floor(seconds/60)}:${String(seconds%60).padStart(2,"0")}`}
function roundedRect(x,y,w,h,r){const rr=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+rr,y);ctx.arcTo(x+w,y,x+w,y+h,rr);ctx.arcTo(x+w,y+h,x,y+h,rr);ctx.arcTo(x,y+h,x,y,rr);ctx.arcTo(x,y,x+w,y,rr);ctx.closePath()}
function currentBeat(){return virtualTime*map.bpm/60}
function setTime(value){virtualTime=Math.max(0,Math.min(map.duration,value));lastHitIndex=map.notes.findLastIndex(note=>note.b<currentBeat()-.15);combo=Math.max(0,lastHitIndex+1);lastTickBeat=Math.floor(currentBeat())}
function tickAudio(beat){
  if(!soundEnabled||!audioContext)return;
  const now=audioContext.currentTime,accent=sectionStartSet.has(beat),bar=beat%4===0;
  const osc=audioContext.createOscillator(),gain=audioContext.createGain();
  osc.type="sine";osc.frequency.setValueAtTime(accent?1800:bar?1250:950,now);
  gain.gain.setValueAtTime(accent?.34:bar?.25:.18,now);gain.gain.exponentialRampToValueAtTime(.0001,now+(accent?.075:.045));
  osc.connect(gain).connect(audioContext.destination);osc.start(now);osc.stop(now+.09);
}
async function enableSound(){
  if(!audioContext)audioContext=new (window.AudioContext||window.webkitAudioContext)();
  await audioContext.resume();soundEnabled=true;soundGate.classList.add("hidden");lastTickBeat=Math.floor(currentBeat())-1
}
soundGate.addEventListener("click",enableSound);
document.addEventListener("pointerdown",event=>{if(!soundEnabled&&!event.target.closest("button,a,input"))enableSound()},{passive:true});
playButton.addEventListener("click",()=>{running=!running;playButton.textContent=running?"Pause":"Play"});
restartButton.addEventListener("click",()=>{setTime(0);running=true;playButton.textContent="Pause"});
seek.addEventListener("input",()=>setTime(map.duration*(Number(seek.value)/1000)));
document.querySelectorAll(".speedButton").forEach(button=>button.addEventListener("click",()=>{speed=Number(button.dataset.speed);document.querySelectorAll(".speedButton").forEach(item=>item.classList.toggle("active",item===button));speedPill.textContent=`${speed}×`}));
function sectionAt(beat){let result=map.sections[0];for(const section of map.sections){if(section.startBeat<=beat)result=section;else break}return result}
function drawTunnel(beat){
  ctx.fillStyle="#05070b";ctx.fillRect(0,0,cssWidth,cssHeight);const horizonY=cssHeight*.29,centerX=cssWidth*.5,pulse=.5+.5*Math.sin(beat*Math.PI*2);
  for(let i=0;i<10;i++){const phase=(i/10+(beat*.035))%1,scale=.08+phase*.96,w=cssWidth*.8*scale,h=cssHeight*.66*scale;ctx.strokeStyle=`rgba(${50+Math.floor(30*pulse)},${80+Math.floor(60*phase)},${130+Math.floor(100*phase)},${.10+.25*phase})`;ctx.lineWidth=1+4*phase;ctx.strokeRect(centerX-w/2,horizonY-h*.05,w,h)}
  ctx.strokeStyle="rgba(90,145,220,.18)";ctx.lineWidth=2;
  for(let x=0;x<4;x++){const gx=cssWidth*.25+x*(cssWidth*.5/3);ctx.beginPath();ctx.moveTo(centerX,horizonY);ctx.lineTo(gx,cssHeight*.82);ctx.stroke()}
  for(let y=0;y<3;y++){const gy=cssHeight*.62+y*cssHeight*.10;ctx.beginPath();ctx.moveTo(cssWidth*.22,gy);ctx.lineTo(cssWidth*.78,gy);ctx.stroke()}
}
function project(note,beat){const delta=note.b-beat,t=1-Math.max(0,Math.min(1,delta/approachBeats)),ease=t*t*(3-2*t),horizonX=cssWidth*.5,horizonY=cssHeight*.29,hitLeft=cssWidth*.26,hitTop=cssHeight*.59,cellW=cssWidth*.48/4,cellH=cssHeight*.25/3,targetX=hitLeft+(note.x+.5)*cellW,targetY=hitTop+(2-note.y+.5)*cellH;return{x:horizonX+(targetX-horizonX)*ease,y:horizonY+(targetY-horizonY)*ease,size:8+(Math.min(cellW,cellH)*.72-8)*ease,alpha:.15+.85*ease,delta}}
function drawNote(note,p){const size=p.size,x=p.x-size/2,y=p.y-size/2;ctx.globalAlpha=p.alpha;const color=note.c===0?"#ef334f":"#2398ff",glow=note.c===0?"rgba(239,51,79,.55)":"rgba(35,152,255,.55)";ctx.shadowColor=glow;ctx.shadowBlur=12*(size/45);roundedRect(x,y,size,size,size*.17);ctx.fillStyle=color;ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle="rgba(255,255,255,.35)";ctx.lineWidth=Math.max(1,size*.045);ctx.stroke();ctx.fillStyle="white";ctx.font=`900 ${Math.max(10,size*.53)}px system-ui`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(arrowGlyph[note.d],p.x,p.y+1);if(note.connector){ctx.strokeStyle="#8ceaff";ctx.lineWidth=Math.max(1,size*.055);roundedRect(x-3,y-3,size+6,size+6,size*.2);ctx.stroke()}ctx.globalAlpha=1}
function drawSaber(note,p,beat){const delta=Math.abs(note.b-beat);if(delta>.23)return;const intensity=1-delta/.23,angle=[-Math.PI/2,Math.PI/2,Math.PI,0,-3*Math.PI/4,-Math.PI/4,3*Math.PI/4,Math.PI/4][note.d],len=55+85*intensity,dx=Math.cos(angle)*len,dy=Math.sin(angle)*len,baseX=note.c===0?cssWidth*.34:cssWidth*.66,baseY=cssHeight*.90;ctx.strokeStyle=note.c===0?`rgba(255,75,105,${.35+.65*intensity})`:`rgba(75,180,255,${.35+.65*intensity})`;ctx.lineWidth=6+6*intensity;ctx.lineCap="round";ctx.shadowColor=ctx.strokeStyle;ctx.shadowBlur=18;ctx.beginPath();ctx.moveTo(baseX,baseY);ctx.lineTo(p.x-dx*.35,p.y-dy*.35);ctx.lineTo(p.x+dx*.5,p.y+dy*.5);ctx.stroke();ctx.shadowBlur=0}
function animate(now){
  requestAnimationFrame(animate);const dt=Math.min(.1,(now-lastFrame)/1000);lastFrame=now;
  if(running){virtualTime+=dt*speed;if(virtualTime>=map.duration){virtualTime=0;lastHitIndex=-1;combo=0;lastTickBeat=-1}}
  const beat=currentBeat(),wholeBeat=Math.floor(beat);
  if(soundEnabled&&running&&wholeBeat>lastTickBeat){for(let b=lastTickBeat+1;b<=wholeBeat;b++)tickAudio(b);lastTickBeat=wholeBeat}
  drawTunnel(beat);const visible=[];
  for(const note of map.notes){if(note.b<beat-.35)continue;if(note.b>beat+approachBeats)break;visible.push([note,project(note,beat)])}
  visible.sort((a,b)=>b[1].delta-a[1].delta);for(const [note,p] of visible)drawNote(note,p);for(const [note,p] of visible)drawSaber(note,p,beat);
  let hitIndex=lastHitIndex;while(hitIndex+1<map.notes.length&&map.notes[hitIndex+1].b<=beat+.03){hitIndex++;combo++;flash.style.opacity=".08"}if(hitIndex!==lastHitIndex)lastHitIndex=hitIndex;
  const opacity=Number(flash.style.opacity||0);if(opacity>0)flash.style.opacity=String(Math.max(0,opacity-.012));
  const section=sectionAt(beat);sectionTitle.textContent=`${String(section.flowIndex).padStart(2,"0")} · ${section.flowName}`;sectionMeta.textContent=`${section.alternativeName} · section ${section.index}/80 · ${section.noteCount} source notes`;beatPill.textContent=`BEAT ${beat.toFixed(1)}`;comboPill.textContent=`AUTO ×${combo}`;seek.value=String(Math.round(1000*virtualTime/map.duration));timeLabel.textContent=`${fmt(virtualTime)} / ${fmt(map.duration)}`
}
try{
  const zipBase64=(window.FLOW_SHOWCASE_ZIP_CHUNKS||[]).join("");
  const bytes=Uint8Array.from(atob(zipBase64),character=>character.charCodeAt(0));
  document.getElementById("downloadMap").href=URL.createObjectURL(new Blob([bytes],{type:"application/zip"}));
  sectionMeta.textContent=`${map.notes.length} notes · ${fmt(map.duration)} · automatic visual playback`;
  requestAnimationFrame(animate);
}catch(error){sectionTitle.textContent="Failed to load showcase";sectionMeta.textContent=String(error)}
</script>
</body>
</html>
