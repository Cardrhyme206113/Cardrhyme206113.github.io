function validateInfoCharacteristics(info,characteristicSets){
  const expected=characteristicSets.map(set=>set.characteristic);
  const actual=(info._difficultyBeatmapSets||[])
    .map(set=>set._beatmapCharacteristicName);

  if(JSON.stringify(actual)!==JSON.stringify(expected)){
    throw new Error(
      `Info.dat mode manifest mismatch. Expected ${expected.join(", ")}; got ${actual.join(", ")||"none"}.`
    );
  }

  const filenames=new Set();
  for(const set of info._difficultyBeatmapSets){
    if(set._difficultyBeatmaps.length!==DIFFICULTY_CONFIGS.length){
      throw new Error(
        `Info.dat ${set._beatmapCharacteristicName} mode has ${set._difficultyBeatmaps.length} difficulties instead of ${DIFFICULTY_CONFIGS.length}.`
      );
    }
    for(const difficulty of set._difficultyBeatmaps){
      if(!difficulty._beatmapFilename){
        throw new Error(`Info.dat contains a mode difficulty without a filename.`);
      }
      filenames.add(difficulty._beatmapFilename);
    }
  }

  return {expected,actual,filenames};
}

function canvasBlob(canvas,type="image/png",quality){
  return new Promise((resolve,reject)=>{
    canvas.toBlob(blob=>blob?resolve(blob):reject(new Error("Could not create cover.")),type,quality);
  });
}

async function createCover(songName,seed){
  const canvas=document.createElement("canvas");
  canvas.width=256;
  canvas.height=256;
  const g=canvas.getContext("2d");
  const hue=seed%360;
  const gradient=g.createLinearGradient(0,0,256,256);
  gradient.addColorStop(0,`hsl(${hue} 48% 10%)`);
  gradient.addColorStop(1,`hsl(${(hue+85)%360} 62% 23%)`);
  g.fillStyle=gradient;
  g.fillRect(0,0,256,256);

  g.save();
  g.translate(128,128);
  g.rotate(-.62);
  g.shadowBlur=22;
  g.shadowColor="#ff3f70";
  g.fillStyle="#ff496f";
  g.fillRect(-70,-19,140,18);
  g.rotate(1.24);
  g.shadowColor="#47a3ff";
  g.fillStyle="#4e9fff";
  g.fillRect(-70,1,140,18);
  g.restore();

  g.fillStyle="rgba(0,0,0,.38)";
  g.fillRect(0,202,256,54);
  g.fillStyle="#fff";
  g.font="700 15px system-ui,sans-serif";
  g.textAlign="center";
  const title=songName.length>28?songName.slice(0,27)+"…":songName;
  g.fillText(title,128,228);
  g.fillStyle="rgba(255,255,255,.68)";
  g.font="600 10px system-ui,sans-serif";
  g.fillText("SIMPLIFIED SABERS",128,244);
  return canvasBlob(canvas);
}

let crcTable=null;
function getCrcTable(){
  if(crcTable)return crcTable;
  crcTable=new Uint32Array(256);
  for(let n=0;n<256;n++){
    let c=n;
    for(let k=0;k<8;k++)c=(c&1)?(0xedb88320^(c>>>1)):(c>>>1);
    crcTable[n]=c>>>0;
  }
  return crcTable;
}

function crc32(bytes){
  const table=getCrcTable();
  let c=0xffffffff;
  for(let i=0;i<bytes.length;i++)c=table[(c^bytes[i])&255]^(c>>>8);
  return (c^0xffffffff)>>>0;
}

function writeU16(view,offset,value){view.setUint16(offset,value,true);}
function writeU32(view,offset,value){view.setUint32(offset,value>>>0,true);}

function makeStoredZip(entries){
  const encoder=new TextEncoder();
  const prepared=entries.map(entry=>{
    const name=encoder.encode(entry.name);
    const data=entry.data instanceof Uint8Array
      ? entry.data
      : encoder.encode(String(entry.data));
    return {name,data,crc:crc32(data),offset:0};
  });

  const now=new Date();
  const dosTime=((now.getHours()&31)<<11)|((now.getMinutes()&63)<<5)|((now.getSeconds()/2)&31);
  const dosDate=(((now.getFullYear()-1980)&127)<<9)|(((now.getMonth()+1)&15)<<5)|(now.getDate()&31);

  let localSize=0,centralSize=0;
  for(const e of prepared){
    localSize+=30+e.name.length+e.data.length;
    centralSize+=46+e.name.length;
  }
  const out=new Uint8Array(localSize+centralSize+22);
  const view=new DataView(out.buffer);
  let p=0;

  for(const e of prepared){
    e.offset=p;
    writeU32(view,p,0x04034b50); p+=4;
    writeU16(view,p,20); p+=2;
    writeU16(view,p,0x0800); p+=2;
    writeU16(view,p,0); p+=2;
    writeU16(view,p,dosTime); p+=2;
    writeU16(view,p,dosDate); p+=2;
    writeU32(view,p,e.crc); p+=4;
    writeU32(view,p,e.data.length); p+=4;
    writeU32(view,p,e.data.length); p+=4;
    writeU16(view,p,e.name.length); p+=2;
    writeU16(view,p,0); p+=2;
    out.set(e.name,p); p+=e.name.length;
    out.set(e.data,p); p+=e.data.length;
  }

  const centralOffset=p;
  for(const e of prepared){
    writeU32(view,p,0x02014b50); p+=4;
    writeU16(view,p,20); p+=2;
    writeU16(view,p,20); p+=2;
    writeU16(view,p,0x0800); p+=2;
    writeU16(view,p,0); p+=2;
    writeU16(view,p,dosTime); p+=2;
    writeU16(view,p,dosDate); p+=2;
    writeU32(view,p,e.crc); p+=4;
    writeU32(view,p,e.data.length); p+=4;
    writeU32(view,p,e.data.length); p+=4;
    writeU16(view,p,e.name.length); p+=2;
    writeU16(view,p,0); p+=2;
    writeU16(view,p,0); p+=2;
    writeU16(view,p,0); p+=2;
    writeU16(view,p,0); p+=2;
    writeU32(view,p,0); p+=4;
    writeU32(view,p,e.offset); p+=4;
    out.set(e.name,p); p+=e.name.length;
  }

  const actualCentralSize=p-centralOffset;
  writeU32(view,p,0x06054b50); p+=4;
  writeU16(view,p,0); p+=2;
  writeU16(view,p,0); p+=2;
  writeU16(view,p,prepared.length); p+=2;
  writeU16(view,p,prepared.length); p+=2;
  writeU32(view,p,actualCentralSize); p+=4;
  writeU32(view,p,centralOffset); p+=4;
  writeU16(view,p,0); p+=2;
  return out;
}

async function bytesFromBlob(blob){
  return new Uint8Array(await blob.arrayBuffer());
}

function downloadBlob(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),30000);
}

async function buildMapZip(result,audioChannels,sampleRate){
  const seed=await songSeed(sourceBlob);
  const songName=safeBaseName(sourceBlob.name);
  const featureOptions={
    bombs:els.featureBombs.checked,
    walls:els.featureWalls.checked,
    arcs:els.featureArcs.checked
  };

  setProgress(
    .845,
    "Building beat-driven default lighting…"
  );
  const lightingEvents=buildVanillaLightingEvents(
    result,
    seed
  );

  const requestedModes=[
    "Standard",
    "No Arrows",
    "One Saber",
    "90 Degree",
    "360 Degree"
  ];
  setProgress(
    .855,
    `Building ${requestedModes.join(", ")} difficulties…`
  );

  const standardDifficulties=DIFFICULTY_CONFIGS.map(
    config=>buildBeatmap(
      result,
      seed,
      config,
      lightingEvents,
      featureOptions
    )
  );
  const characteristicSets=[
    {
      characteristic:"Standard",
      difficulties:standardDifficulties
    },
    {
      characteristic:"NoArrows",
      difficulties:standardDifficulties.map(makeNoArrowsDifficulty)
    },
    {
      characteristic:"OneSaber",
      difficulties:standardDifficulties.map(difficulty=>
        buildOneSaberDifficulty(
          difficulty,
          seed,
          lightingEvents,
          featureOptions
        )
      )
    },
    {
      characteristic:"90Degree",
      difficulties:standardDifficulties.map(difficulty=>
        buildRotationDifficulty(difficulty,seed,"90Degree")
      )
    },
    {
      characteristic:"360Degree",
      difficulties:standardDifficulties.map(difficulty=>
        buildRotationDifficulty(difficulty,seed,"360Degree")
      )
    }
  ];

  const difficulties=characteristicSets.flatMap(set=>set.difficulties);
  const expertPlus=standardDifficulties.find(
    difficulty=>difficulty.config.id==="expertPlus"
  );
  const expertPlusNps=expertPlus?.nps||0;
  els.npsNote.textContent="";

  setProgress(.87,"Encoding high-quality OGG…");
  const oggBytes=await encodeOggVorbis(audioChannels,sampleRate,{
    vbrQuality:3,
    onProgress:async ratio=>{
      setProgress(
        .875+ratio*.09,
        `Encoding high-quality OGG… ${Math.round(ratio*100)}%`
      );
      await nextTick();
    }
  });

  // Player uses the exact compressed song included in the ZIP.
  if(audioUrl)URL.revokeObjectURL(audioUrl);
  audioUrl=URL.createObjectURL(
    new Blob([oggBytes],{type:"audio/ogg"})
  );
  els.audio.src=audioUrl;

  setProgress(.975,"Creating cover and multi-difficulty package…");
  const cover=await createCover(songName,seed);
  const info=makeInfo(songName,result.duration,characteristicSets);
  const manifest=validateInfoCharacteristics(info,characteristicSets);
  const encoder=new TextEncoder();
  const beatmapEntries=difficulties.map(difficulty=>({
    name:difficulty.filename,
    data:encoder.encode(JSON.stringify(difficulty.beatmap))
  }));
  const packagedFilenames=new Set(beatmapEntries.map(entry=>entry.name));

  for(const filename of manifest.filenames){
    if(!packagedFilenames.has(filename)){
      throw new Error(`Info.dat references missing beatmap file: ${filename}`);
    }
  }

  const entries=[
    {
      name:"Info.dat",
      data:encoder.encode(JSON.stringify(info,null,2))
    },
    ...beatmapEntries,
    {name:"song.ogg",data:oggBytes},
    {name:"cover.png",data:await bytesFromBlob(cover)}
  ];

  const zipBytes=makeStoredZip(entries);
  const zipBlob=new Blob([zipBytes],{type:"application/zip"});
  const allFlowIds=new Set(
    difficulties.flatMap(difficulty=>difficulty.usedFlowIds)
  );

  return {
    blob:zipBlob,
    name:`${songName}_SimplifiedSabers.zip`,
    characteristicSets,
    packagedCharacteristics:manifest.actual,
    difficulties,
    usedFlowCount:allFlowIds.size,
    lightingEventCount:lightingEvents.length,
    expertPlusNps,
    totalEventCount:difficulties.reduce(
      (sum,difficulty)=>sum+difficulty.eventCount,
      0
    )
  };
}


async function runAnalysis(){
  if(!sourceBlob) return;
  els.analyzeBtn.disabled=true; els.demoBtn.disabled=true; els.file.disabled=true;
  els.featureBombs.disabled=true; els.featureWalls.disabled=true; els.featureArcs.disabled=true;
  els.jsonBtn.disabled=true; els.csvBtn.disabled=true;
  try{
    setProgress(.01,"Decoding audio…");
    const data = await sourceBlob.arrayBuffer();
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const decoded = await ctx.decodeAudioData(data.slice(0));
    const analysisRate = 22050;
    const outputRate = 32000;
    const maxSeconds = Math.min(300, decoded.duration);
    const mono = downmixAndResample(decoded, analysisRate, maxSeconds);
    const outputChannels = resampleChannelsForOutput(
      decoded,
      outputRate,
      maxSeconds
    );
    await ctx.close();

    setProgress(.05,"Computing harmonic salience…");
    const result = await analyzeSamples(mono, analysisRate, {
      tracks:1,
      confidence:0.90,
      ambiguity:0.10,
      stability:2.50
    });
    setProgress(.82,"Detecting independent beat events…");
    result.patterns = await analyzeBeatSynchronousPatterns(result,mono,analysisRate,{
      contextBeats:4,
      threshold:0.78,
      transposeInvariant:true,
      sensitivity:1.00,
      minimumGapMs:100,
      stabilityGate:true,
      autoDensityFloor:true,
      targetEventDensity:1,
      minimumStateChange:0.28,
      stateChangeThreshold:0.40,
      stabilityWindowMs:185
    });
    analysis=result;
    setInitialBeatView();
    renderAll();

    const output=await buildMapZip(result,outputChannels,outputRate);
    lastMapZip=output.blob;
    lastMapZipName=output.name;
    els.analyzeBtn.textContent="Open Map";
    setProgress(1,"Done");
    try{
      await launchArcViewer(lastMapZip,lastMapZipName);
    }catch(viewerError){
      console.warn(viewerError);
      els.mapStatus.textContent=
        `Map created. ArcViewer preview unavailable; tap Download Map for the ZIP.`;
    }
  }catch(err){
    console.error(err);
    const message="Build failed: "+(err.message||err);
    els.status.textContent=message;
    els.mapStatus.textContent=message;
    els.analyzeBtn.textContent="Try Again";
  }finally{
    // Keep mobile/landscape browsers centered after status changes.
    document.documentElement.scrollLeft=0;
    document.body.scrollLeft=0;
    window.scrollTo({left:0,top:window.scrollY,behavior:"auto"});
    els.analyzeBtn.disabled=false; els.demoBtn.disabled=false; els.file.disabled=false;
    els.featureBombs.disabled=false; els.featureWalls.disabled=false; els.featureArcs.disabled=false;
    if(!lastMapZip&&els.analyzeBtn.textContent!=="Try Again")els.analyzeBtn.textContent="Create Map";
  }
}

function downmixAndResample(buffer, targetRate, maxSeconds){
  const srcRate=buffer.sampleRate;
  const srcLen=Math.min(buffer.length, Math.floor(maxSeconds*srcRate));
  const channels=buffer.numberOfChannels;
  const outLen=Math.floor(srcLen*targetRate/srcRate);
  const out=new Float32Array(outLen);
  const channelData=[];
  for(let c=0;c<channels;c++) channelData.push(buffer.getChannelData(c));
  for(let i=0;i<outLen;i++){
    const pos=i*srcRate/targetRate, i0=Math.floor(pos), i1=Math.min(srcLen-1,i0+1), t=pos-i0;
    let s=0;
    for(let c=0;c<channels;c++) s += channelData[c][i0]*(1-t)+channelData[c][i1]*t;
    out[i]=s/channels;
  }
  return out;
}

function resampleChannelsForOutput(buffer,targetRate,maxSeconds){
  const srcRate=buffer.sampleRate;
  const srcLen=Math.min(buffer.length,Math.floor(maxSeconds*srcRate));
  const outputChannelCount=Math.min(2,Math.max(1,buffer.numberOfChannels));
  const outLen=Math.floor(srcLen*targetRate/srcRate);
  const sourceChannels=[];
  for(let c=0;c<outputChannelCount;c++){
    sourceChannels.push(buffer.getChannelData(c));
  }

  return sourceChannels.map(source=>{
    const out=new Float32Array(outLen);
    for(let i=0;i<outLen;i++){
      const pos=i*srcRate/targetRate;
      const i0=Math.floor(pos);
      const i1=Math.min(srcLen-1,i0+1);
      const t=pos-i0;
      out[i]=source[i0]*(1-t)+source[i1]*t;
    }
    return out;
  });
}

function fft(re, im){
  const n=re.length;
  for(let i=1,j=0;i<n;i++){
    let bit=n>>1;
    for(;j&bit;bit>>=1) j^=bit;
    j^=bit;
    if(i<j){ [re[i],re[j]]=[re[j],re[i]]; [im[i],im[j]]=[im[j],im[i]]; }
  }
  for(let len=2;len<=n;len<<=1){
    const ang=-2*Math.PI/len, wlr=Math.cos(ang), wli=Math.sin(ang);
    for(let i=0;i<n;i+=len){
      let wr=1,wi=0;
      for(let j=0;j<len/2;j++){
        const uR=re[i+j], uI=im[i+j];
        const vR=re[i+j+len/2]*wr-im[i+j+len/2]*wi;
        const vI=re[i+j+len/2]*wi+im[i+j+len/2]*wr;
        re[i+j]=uR+vR; im[i+j]=uI+vI;
        re[i+j+len/2]=uR-vR; im[i+j+len/2]=uI-vI;
        const nwr=wr*wlr-wi*wli; wi=wr*wli+wi*wlr; wr=nwr;
      }
    }
  }
}

async function analyzeSamples(samples, sampleRate, opts){
  const t0=performance.now();
  const N=4096, hop=1024, minMidi=36, maxMidi=96;
  const P=maxMidi-minMidi+1;
  const frames=Math.max(1,Math.floor((samples.length-N)/hop)+1);
  const salience=Array.from({length:frames},()=>new Float32Array(P));
  const rawTop=new Float32Array(frames), rawSecond=new Float32Array(frames);
  const window=new Float32Array(N);
  for(let i=0;i<N;i++) window[i]=.5-.5*Math.cos(2*Math.PI*i/(N-1));

  const re=new Float32Array(N), im=new Float32Array(N), mag=new Float32Array(N/2);
  let prevMag=new Float32Array(N/2);

  for(let t=0;t<frames;t++){
    const off=t*hop;
    for(let i=0;i<N;i++){ re[i]=(samples[off+i]||0)*window[i]; im[i]=0; }
    fft(re,im);
    let flux=0;
    for(let k=1;k<N/2;k++){
      const m=Math.log1p(4*Math.hypot(re[k],im[k]));
      mag[k]=m; flux+=Math.max(0,m-prevMag[k]);
    }
    const scores=new Float32Array(P);
    for(let p=0;p<P;p++){
      const f0=midiToHz(minMidi+p);
      let s=0,wSum=0;
      for(let h=1;h<=8;h++){
        const f=f0*h; if(f>=sampleRate/2) break;
        const bin=f*N/sampleRate, k=Math.floor(bin), frac=bin-k;
        const v=(mag[k]||0)*(1-frac)+(mag[k+1]||0)*frac;
        const w=1/Math.sqrt(h);
        s += v*w; wSum += w;
      }
      // Reward local onsets, but only gently so sustained notes remain visible.
      const baseBin=f0*N/sampleRate, kb=Math.round(baseBin);
      let localFlux=0;
      for(let k=Math.max(1,kb-2);k<=Math.min(N/2-1,kb+2);k++)
        localFlux += Math.max(0,mag[k]-prevMag[k]);
      scores[p]=s/(wSum||1)+0.10*localFlux+0.002*flux;
    }

    const med=median(scores);
    const absdev=Array.from(scores,x=>Math.abs(x-med));
    const mad=median(absdev)+1e-4;
    let best=-Infinity,second=-Infinity;
    for(let p=0;p<P;p++){
      const z=(scores[p]-med)/(1.4826*mad);
      salience[t][p]=clamp(z,-2,8);
      if(z>best){second=best;best=z}else if(z>second)second=z;
    }
    rawTop[t]=best; rawSecond[t]=second;
    prevMag.set(mag);

    if(t%24===0){
      setProgress(.05+.57*(t/frames),`Analyzing frame ${t+1}/${frames}…`);
      await nextTick();
    }
  }

  setProgress(.63,"Tracking stable note layers…");
  const residual=salience.map(row=>Float32Array.from(row));
  const layers=[];
  for(let k=0;k<opts.tracks;k++){
    const path=viterbiTrack(residual, opts.stability);
    layers.push(path);
    for(let t=0;t<frames;t++){
      const p=path[t];
      if(p>=0) for(let d=-2;d<=2;d++){
        const q=p+d;
        if(q>=0&&q<P) residual[t][q]-=(2.8-0.6*Math.abs(d));
      }
    }
    setProgress(.63+.12*((k+1)/opts.tracks),`Tracked layer ${k+1}/${opts.tracks}…`);
    await nextTick();
  }

  setProgress(.77,"Choosing dominant foreground vs. no-foreground…");
  const frameData=[];
  for(let t=0;t<frames;t++){
    const candidates=[];
    for(let k=0;k<layers.length;k++){
      const p=layers[k][t];
      if(p>=0) candidates.push({layer:k,pitch:p,score:salience[t][p]});
    }
    candidates.sort((a,b)=>b.score-a.score);
    const best=candidates[0], second=candidates[1];
    // "Activity" asks whether a real pitched component exists.
    // "Clarity" asks whether it is more salient than the other tracked layers.
    const activity = best ? sigmoid((best.score-0.35)*1.30) : 0;
    const margin = best ? (best.score-(second?.score ?? 0)) : 0;
    const clarity = sigmoid((margin-opts.ambiguity)*3.0);
    const confidence=clamp(activity*clarity,0,1);
    const dominant = !!best && best.score>0.10 && confidence>=opts.confidence;
    frameData.push({
      time:t*hop/sampleRate,
      foreground:dominant ? minMidi+best.pitch : null,
      confidence,
      layers:candidates.map(c=>minMidi+c.pitch)
    });
  }

  const events=consolidateEvents(frameData, hop/sampleRate);
  const duration=samples.length/sampleRate;
  const foregroundFrames=frameData.filter(f=>f.foreground!==null).length;
  const elapsed=(performance.now()-t0)/1000;
  return {
    sampleRate, frameSize:N, hopSize:hop, minMidi,maxMidi,duration,
    frames:frameData, layers:layers.map(path=>Array.from(path,p=>p<0?null:minMidi+p)),
    events, framesPerSecond:frames/Math.max(.001,elapsed),
    coverage:foregroundFrames/frames,
    options:opts
  };
}

function viterbiTrack(S, stability){
  const T=S.length, P=S[0].length;
  let prev=new Float32Array(P), cur=new Float32Array(P);
  const back=Array.from({length:T},()=>new Int16Array(P));

  // Start on any plausible pitch instead of forcing a transition out of NONE.
  for(let p=0;p<P;p++){
    prev[p]=S[0][p];
    back[0][p]=p;
  }

  for(let t=1;t<T;t++){
    for(let p=0;p<P;p++){
      let best=-1e9, bestQ=p;
      const lo=Math.max(0,p-18), hi=Math.min(P-1,p+18);
      for(let q=lo;q<=hi;q++){
        const jump=Math.abs(p-q);
        // Strongly prefer continuity, but still allow genuine melodic jumps.
        const transition=stability*(0.075*jump+0.010*jump*jump);
        const v=prev[q]-transition;
        if(v>best){best=v;bestQ=q;}
      }
      cur[p]=best+S[t][p];
      back[t][p]=bestQ;
    }
    [prev,cur]=[cur,prev];
  }

  let state=0;
  for(let p=1;p<P;p++) if(prev[p]>prev[state]) state=p;
  const path=new Int16Array(T);
  for(let t=T-1;t>=0;t--){
    path[t]=state;
    state=back[t][state];
  }
  return path;
}


function fillMissing(values){
  const out=values.slice();
  let first=out.findIndex(v=>v!==null);
  if(first<0) return null;
  for(let i=0;i<first;i++) out[i]=out[first];
  let last=first;
  for(let i=first+1;i<out.length;i++){
    if(out[i]!==null){
      const a=out[last], b=out[i], span=i-last;
      for(let j=1;j<span;j++) out[last+j]=a+(b-a)*(j/span);
      last=i;
    }
  }
  for(let i=last+1;i<out.length;i++) out[i]=out[last];
  return out;
}

function melodyDistance(a,b){
  const n=a.sequence.length, band=5, INF=1e9;
  let prev=new Float32Array(n+1), cur=new Float32Array(n+1);
  prev.fill(INF); prev[0]=0;
  for(let i=1;i<=n;i++){
    cur.fill(INF);
    const lo=Math.max(1,i-band), hi=Math.min(n,i+band);
    for(let j=lo;j<=hi;j++){
      const pitch=Math.abs(a.sequence[i-1]-b.sequence[j-1]);
      const da=i>1?a.sequence[i-1]-a.sequence[i-2]:0;
      const db=j>1?b.sequence[j-1]-b.sequence[j-2]:0;
      const contour=.35*Math.abs(da-db);
      const mask=Math.abs((a.mask[i-1]||0)-(b.mask[j-1]||0))*.18;
      const cost=pitch+contour+mask;
      cur[j]=cost+Math.min(prev[j],cur[j-1],prev[j-1]);
    }
    [prev,cur]=[cur,prev];
  }
  let rhythmCost=0;
  if(a.rhythm&&b.rhythm){
    const m=Math.min(a.rhythm.length,b.rhythm.length);
    for(let i=0;i<m;i++)rhythmCost+=Math.abs(a.rhythm[i]-b.rhythm[i]);
    rhythmCost/=Math.max(1,m);
  }
  return prev[n]/n + .18*Math.abs(a.activity-b.activity) + .24*rhythmCost;
}

function mdsOneDimension(distanceMatrix){
  const n=distanceMatrix.length;
  if(n===0) return [];
  if(n===1) return [.5];
  const rowMean=new Float64Array(n);
  let total=0;
  for(let i=0;i<n;i++) for(let j=0;j<n;j++){
    const d2=distanceMatrix[i][j]*distanceMatrix[i][j];
    rowMean[i]+=d2; total+=d2;
  }
  for(let i=0;i<n;i++) rowMean[i]/=n;
  total/=n*n;

  let x=new Float64Array(n);
  for(let i=0;i<n;i++) x[i]=Math.sin((i+1)*1.713)+Math.cos((i+1)*.619);
  let mean=x.reduce((a,b)=>a+b,0)/n;
  for(let i=0;i<n;i++) x[i]-=mean;

  for(let iteration=0;iteration<80;iteration++){
    const y=new Float64Array(n);
    for(let i=0;i<n;i++){
      let sum=0;
      for(let j=0;j<n;j++){
        const d2=distanceMatrix[i][j]*distanceMatrix[i][j];
        const Bij=-.5*(d2-rowMean[i]-rowMean[j]+total);
        sum+=Bij*x[j];
      }
      y[i]=sum;
    }
    mean=y.reduce((a,b)=>a+b,0)/n;
    let norm=0;
    for(let i=0;i<n;i++){y[i]-=mean;norm+=y[i]*y[i];}
    norm=Math.sqrt(norm)||1;
    for(let i=0;i<n;i++) x[i]=y[i]/norm;
  }
  let lo=Math.min(...x),hi=Math.max(...x);
  if(hi-lo<1e-8) return Array.from({length:n},(_,i)=>n===1?.5:i/(n-1));
  return Array.from(x,v=>(v-lo)/(hi-lo));
}

function groupLabel(index){
  let n=index+1,s="";
  while(n>0){n--;s=String.fromCharCode(65+n%26)+s;n=Math.floor(n/26);}
  return s;
}

function localStandardize(values,radius){
  const n=values.length,out=new Float32Array(n);
  const prefix=new Float64Array(n+1),prefix2=new Float64Array(n+1);
  for(let i=0;i<n;i++){
    prefix[i+1]=prefix[i]+values[i];
    prefix2[i+1]=prefix2[i]+values[i]*values[i];
  }
  for(let i=0;i<n;i++){
    const a=Math.max(0,i-radius),b=Math.min(n,i+radius+1),count=b-a;
    const mean=(prefix[b]-prefix[a])/count;
    const variance=Math.max(1e-8,(prefix2[b]-prefix2[a])/count-mean*mean);
    out[i]=(values[i]-mean)/(Math.sqrt(variance)+1e-4);
  }
  return out;
}

function spectralEventFeatures(samples,sampleRate){
  const N=1024,hop=256,frames=Math.max(1,Math.floor((samples.length-N)/hop)+1);
  const re=new Float32Array(N),im=new Float32Array(N),mag=new Float32Array(N/2),prev=new Float32Array(N/2);
  const broad=new Float32Array(frames),low=new Float32Array(frames),high=new Float32Array(frames),energyRise=new Float32Array(frames);
  const energyLevel=new Float32Array(frames);
  const window=new Float32Array(N);
  for(let i=0;i<N;i++)window[i]=.5-.5*Math.cos(2*Math.PI*i/(N-1));

  const edges=[38,90,180,360,720,1440,2880,5760,sampleRate/2]
    .map(f=>clamp(Math.round(f*N/sampleRate),1,N/2-1));
  const stateBands=Array.from({length:edges.length-1},()=>new Float32Array(frames));
  let previousEnergy=0;

  for(let t=0;t<frames;t++){
    const off=t*hop;
    let energy=0;
    for(let i=0;i<N;i++){
      const s=(samples[off+i]||0)*window[i];
      re[i]=s;im[i]=0;energy+=s*s;
    }
    fft(re,im);
    for(let k=1;k<N/2;k++)mag[k]=Math.log1p(10*Math.hypot(re[k],im[k]));

    let total=0,lowFlux=0,highFlux=0;
    for(let b=0;b<edges.length-1;b++){
      let flux=0,count=0,level=0;
      for(let k=edges[b];k<edges[b+1];k++){
        // Frequency-neighbour maximum reduces false triggers from vibrato.
        const reference=Math.max(
          prev[k],
          prev[Math.max(1,k-1)],
          prev[Math.min(N/2-1,k+1)]
        );
        flux+=Math.max(0,mag[k]-reference);
        level+=mag[k];
        count++;
      }
      stateBands[b][t]=level/Math.max(1,count);
      const normalized=flux/Math.sqrt(Math.max(1,count));
      total+=normalized*(1+.035*b);
      if(b<=2)lowFlux+=normalized;
      if(b>=5)highFlux+=normalized;
    }

    const logEnergy=Math.log1p(energy*800);
    energyLevel[t]=logEnergy;
    broad[t]=total;
    low[t]=lowFlux;
    high[t]=highFlux;
    energyRise[t]=Math.max(0,logEnergy-previousEnergy);
    previousEnergy=logEnergy;
    prev.set(mag);
  }

  const radius=Math.max(18,Math.round(.85*sampleRate/hop));
  const broadZ=localStandardize(broad,radius);
  const lowZ=localStandardize(low,radius);
  const highZ=localStandardize(high,radius);
  const energyZ=localStandardize(energyRise,radius);
  const score=new Float32Array(frames);

  for(let i=0;i<frames;i++){
    const raw=
      .50*Math.max(0,broadZ[i])+
      .27*Math.max(0,lowZ[i])+
      .10*Math.max(0,highZ[i])+
      .13*Math.max(0,energyZ[i]);
    score[i]=raw;
  }

  // Very light smoothing; event timing remains local instead of becoming a grid.
  const smooth=new Float32Array(frames);
  for(let i=0;i<frames;i++){
    const a=score[Math.max(0,i-1)],b=score[i],c=score[Math.min(frames-1,i+1)];
    smooth[i]=.22*a+.56*b+.22*c;
  }
  return {score:smooth,broadZ,lowZ,highZ,energyZ,energyLevel,stateBands,hop};
}

function meanArrayRange(arr,start,end){
  const a=clamp(Math.floor(start),0,arr.length-1);
  const b=clamp(Math.ceil(end),a+1,arr.length);
  let sum=0;
  for(let i=a;i<b;i++)sum+=arr[i];
  return sum/Math.max(1,b-a);
}

function maxArrayRange(arr,start,end){
  const a=clamp(Math.floor(start),0,arr.length-1);
  const b=clamp(Math.ceil(end),a+1,arr.length);
  let value=-Infinity;
  for(let i=a;i<b;i++)value=Math.max(value,arr[i]);
  return Number.isFinite(value)?value:0;
}

function stateChangeCue(F,frame,pitchCue,sampleRate,windowMs=145){
  const framesPerSecond=sampleRate/F.hop;
  const windowFrames=Math.max(4,Math.round(windowMs*.001*framesPerSecond));
  const quietGap=Math.max(1,Math.round(.028*framesPerSecond));
  const attackTail=Math.max(2,Math.round(.060*framesPerSecond));

  const preStart=frame-windowFrames;
  const preEnd=frame-quietGap;
  const attackStart=frame-Math.max(1,Math.round(.010*framesPerSecond));
  const attackEnd=frame+attackTail;

  const weights=[.04,.06,.08,.10,.15,.20,.22,.15];
  let spectralChange=0,weightSum=0;

  for(let b=0;b<F.stateBands.length;b++){
    const before=meanArrayRange(F.stateBands[b],preStart,preEnd);
    const during=maxArrayRange(F.stateBands[b],attackStart,attackEnd);
    // Relative log-spectrum change: strong new high-tone attacks score well,
    // tiny fluctuations in an otherwise stable song do not.
    const delta=Math.max(0,during-before);
    const normalized=clamp(delta/(.20+.22*Math.abs(before)),0,1);
    const weight=weights[b]??(1/F.stateBands.length);
    spectralChange+=normalized*weight;
    weightSum+=weight;
  }
  spectralChange/=Math.max(.001,weightSum);

  const beforeEnergy=meanArrayRange(F.energyLevel,preStart,preEnd);
  const attackEnergy=maxArrayRange(F.energyLevel,attackStart,attackEnd);
  const energyChange=clamp(
    Math.max(0,attackEnergy-beforeEnergy)/(.16+.18*Math.abs(beforeEnergy)),
    0,1
  );

  const transientChange=clamp(
    .55*Math.max(0,F.broadZ[frame])/3.2+
    .45*Math.max(0,F.highZ[frame])/3.2,
    0,1
  );

  const changeIndex=clamp(
    .52*spectralChange+
    .18*energyChange+
    .18*transientChange+
    .12*pitchCue,
    0,1
  );

  return {
    changeIndex,
    stabilityIndex:1-changeIndex,
    spectralChange,
    energyChange,
    transientChange
  };
}

function pitchChangeCue(A,time){
  const frameDur=A.hopSize/A.sampleRate;
  const center=Math.round(time/frameDur);
  const radius=Math.max(1,Math.round(.075/frameDur));
  const track=A.layers[0]||A.frames.map(f=>f.foreground);
  const before=[],after=[];
  for(let d=1;d<=radius;d++){
    const a=track[clamp(center-d,0,track.length-1)];
    const b=track[clamp(center+d,0,track.length-1)];
    if(a!==null&&a!==undefined)before.push(a);
    if(b!==null&&b!==undefined)after.push(b);
  }
  if(!before.length||!after.length)return 0;
  return clamp(Math.abs(median(after)-median(before))/5,0,1);
}

function intervalCompatibility(a,b){
  if(!(a>0&&b>0))return 0;
  const ratio=a/b;
  let best=0;
  for(const target of [.5,1,2]){
    best=Math.max(best,Math.exp(-Math.abs(Math.log2(ratio/target))/0.38));
  }
  return best;
}

function detectBeatEvents(samples,sampleRate,A,opts){
  const F=spectralEventFeatures(samples,sampleRate);
  const x=F.score,hop=F.hop;
  const localRadius=Math.max(10,Math.round(.60*sampleRate/hop));
  const prefix=new Float64Array(x.length+1),prefix2=new Float64Array(x.length+1);
  for(let i=0;i<x.length;i++){
    prefix[i+1]=prefix[i]+x[i];
    prefix2[i+1]=prefix2[i]+x[i]*x[i];
  }

  const rawCandidates=[];
  const sensitivity=opts.sensitivity||1;
  for(let i=2;i<x.length-2;i++){
    if(!(x[i]>=x[i-1]&&x[i]>x[i+1]&&x[i]>=x[i-2]&&x[i]>=x[i+2]))continue;
    const a=Math.max(0,i-localRadius),b=Math.min(x.length,i+localRadius+1),n=b-a;
    const mean=(prefix[b]-prefix[a])/n;
    const variance=Math.max(1e-8,(prefix2[b]-prefix2[a])/n-mean*mean);
    const std=Math.sqrt(variance);
    // Higher sensitivity lowers the adaptive threshold.
    const threshold=mean+(1.10-.48*sensitivity)*std+.10;
    if(x[i]<threshold)continue;
    const time=i*hop/sampleRate;
    const pitchCue=pitchChangeCue(A,time);
    const state=stateChangeCue(
      F,i,pitchCue,sampleRate,opts.stabilityWindowMs||145
    );
    // Do not gate here: the final gate may be relaxed after measuring
    // whole-map event density.
    const timbral=
      .43*clamp(x[i]/3.2,0,1)+
      .22*clamp((F.lowZ[i]+1)/3.2,0,1)+
      .13*clamp((F.highZ[i]+1)/3.2,0,1)+
      .12*pitchCue+
      .10*state.changeIndex;
    rawCandidates.push({
      frame:i,time,raw:x[i],pitchCue,timbral,
      changeIndex:state.changeIndex,
      stabilityIndex:state.stabilityIndex,
      spectralChange:state.spectralChange,
      energyChange:state.energyChange
    });
  }

  function selectAccepted(requiredChange){
    const gated=rawCandidates.filter(candidate=>
      opts.stabilityGate===false || candidate.changeIndex>=requiredChange
    );

    // Score pulse support only among candidates that survived this gate.
    const scored=gated.map((candidate,index)=>{
      const previous=gated[index-1],next=gated[index+1];
      const left=previous?candidate.time-previous.time:0;
      const right=next?next.time-candidate.time:0;
      const localPulse=intervalCompatibility(left,right);
      return {
        ...candidate,
        score:.74*candidate.timbral+.16*localPulse+.10*candidate.changeIndex
      };
    });

    const candidateScores=scored.map(c=>c.score);
    const scoreMedian=candidateScores.length?median(candidateScores):0;
    const deviations=candidateScores.map(v=>Math.abs(v-scoreMedian));
    const scoreMad=deviations.length?median(deviations):0;
    const acceptance=scoreMedian+(0.32-.20*sensitivity)*Math.max(.05,scoreMad);

    const minimumGap=(opts.minimumGapMs||100)/1000;
    const selected=[];
    for(const candidate of scored){
      if(candidate.score<acceptance&&candidate.raw<1.15)continue;
      const last=selected[selected.length-1];
      if(last&&candidate.time-last.time<minimumGap){
        const candidateQuality=candidate.score+.18*candidate.changeIndex;
        const lastQuality=last.score+.18*last.changeIndex;
        if(candidateQuality>lastQuality)selected[selected.length-1]=candidate;
      }else{
        selected.push(candidate);
      }
    }

    // Quiet-song fallback remains inside the active stability gate:
    // it never resurrects candidates below requiredChange.
    if(selected.length<3&&scored.length){
      const fallback=scored.slice()
        .sort((a,b)=>b.score-a.score)
        .slice(0,Math.min(12,scored.length))
        .sort((a,b)=>a.time-b.time);
      selected.length=0;
      for(const candidate of fallback){
        const last=selected[selected.length-1];
        if(!last||candidate.time-last.time>=minimumGap){
          selected.push(candidate);
        }else{
          const candidateQuality=candidate.score+.18*candidate.changeIndex;
          const lastQuality=last.score+.18*last.changeIndex;
          if(candidateQuality>lastQuality)selected[selected.length-1]=candidate;
        }
      }
    }
    return selected;
  }

  const durationSeconds=Math.max(.001,samples.length/sampleRate);
  const requestedStateChange=clamp(
    opts.stateChangeThreshold??.40,
    opts.minimumStateChange??.28,
    .80
  );
  const minimumStateChange=clamp(opts.minimumStateChange??.28,.20,requestedStateChange);
  const targetEventDensity=Math.max(0,opts.targetEventDensity??1);

  let effectiveStateChange=requestedStateChange;
  let accepted=selectAccepted(effectiveStateChange);
  let eventDensity=accepted.length/durationSeconds;

  if(
    opts.stabilityGate!==false &&
    opts.autoDensityFloor!==false &&
    targetEventDensity>0
  ){
    while(
      eventDensity<targetEventDensity &&
      effectiveStateChange>minimumStateChange+1e-6
    ){
      effectiveStateChange=Math.max(
        minimumStateChange,
        +(effectiveStateChange-.02).toFixed(2)
      );
      accepted=selectAccepted(effectiveStateChange);
      eventDensity=accepted.length/durationSeconds;
    }
  }

  const times=accepted.map(c=>c.time);
  const intervals=[];
  for(let i=1;i<times.length;i++)intervals.push(times[i]-times[i-1]);
  const medianInterval=intervals.length?median(intervals):.5;
  const intervalDeviations=intervals.map(v=>Math.abs(v-medianInterval));
  const timingVariation=intervals.length?clamp(median(intervalDeviations)/(medianInterval+1e-6),0,2):0;
  const averageScore=accepted.length?accepted.reduce((s,c)=>s+c.score,0)/accepted.length:0;
  const confidence=clamp((averageScore-.18)/.72,0,1);
  const strongest=Math.max(...accepted.map(c=>c.score),1e-6);

  return {
    times,
    medianInterval,
    timingVariation,
    confidence,
    eventDensity,
    requestedStateChange,
    effectiveStateChange,
    minimumStateChange,
    targetEventDensity,
    autoRelaxed:effectiveStateChange<requestedStateChange-.001,
    densityTargetReached:eventDensity>=targetEventDensity,
    strength:accepted.map(c=>clamp(c.score/strongest,0,1)),
    scores:accepted.map(c=>c.score),
    stateChange:accepted.map(c=>c.changeIndex),
    stabilityIndex:accepted.map(c=>c.stabilityIndex),
    averageStateChange:accepted.length?
      accepted.reduce((s,c)=>s+c.changeIndex,0)/accepted.length:0,
    candidateCount:rawCandidates.length
  };
}

function sampleBeatContext(A,eventTimes,eventIndex,contextEvents,transposeInvariant,duration){
  const track=A.layers[0]||A.frames.map(f=>f.foreground);
  const frameDur=A.hopSize/A.sampleRate,pointsPerEvent=8;
  const raw=[],mask=[],durations=[];
  const first=Math.max(0,eventIndex-contextEvents+1);
  const available=eventIndex-first+1,pad=contextEvents-available;

  for(let slot=0;slot<contextEvents;slot++){
    const event=slot<pad?first:first+(slot-pad);
    const start=eventTimes[event];
    const end=eventTimes[event+1]??duration;
    const eventDuration=Math.max(.045,end-start);
    durations.push(eventDuration);

    for(let p=0;p<pointsPerEvent;p++){
      const time=start+(p+.5)/pointsPerEvent*eventDuration;
      const fi=clamp(Math.round(time/frameDur),0,track.length-1);
      const pitch=track[fi],conf=A.frames[fi]?.confidence??0;
      raw.push(pitch===null||pitch===undefined?null:pitch);
      mask.push(clamp(conf*1.35,0,1));
    }
  }

  const activity=mask.reduce((a,b)=>a+b,0)/Math.max(1,mask.length);
  const filled=fillMissing(raw);
  if(!filled)return null;
  const base=transposeInvariant?median(filled):60;
  const durationMedian=median(durations)||1;
  return {
    sequence:filled.map(v=>clamp((v-base)/12,-2.5,2.5)),
    mask,
    activity,
    rhythm:durations.map(v=>clamp(Math.log2(v/durationMedian),-2,2))
  };
}

async function analyzeBeatSynchronousPatterns(A,samples,sampleRate,opts){
  const detector=detectBeatEvents(samples,sampleRate,A,opts);
  const eventTimes=detector.times.filter(t=>t>=0&&t<A.duration-.03);

  const gateText=detector.autoRelaxed
    ? `; state gate ${detector.requestedStateChange.toFixed(2)}→${detector.effectiveStateChange.toFixed(2)}`
    : `; state gate ${detector.effectiveStateChange.toFixed(2)}`;
  const capText=!detector.densityTargetReached&&detector.effectiveStateChange<=detector.minimumStateChange+.001
    ? ` (0.28 cap reached)`
    : ``;
  setProgress(
    .88,
    `Detected ${eventTimes.length} events (${detector.eventDensity.toFixed(2)}/s)${gateText}${capText}…`
  );
  await nextTick();

  const segments=[];
  for(let i=0;i<eventTimes.length;i++){
    const end=eventTimes[i+1]??A.duration;
    if(end-eventTimes[i]<.035)continue;
    const c=sampleBeatContext(
      A,eventTimes,i,opts.contextBeats,opts.transposeInvariant,A.duration
    );
    if(!c)continue;
    segments.push({
      index:segments.length,
      beatIndex:i,
      start:eventTimes[i],
      end,
      center:eventTimes[i],
      sequence:c.sequence,
      mask:c.mask,
      rhythm:c.rhythm,
      activity:c.activity,
      beatStrength:detector.strength[Math.min(i,detector.strength.length-1)]??0,
      stateChange:detector.stateChange?.[Math.min(i,detector.stateChange.length-1)]??0,
      stabilityIndex:detector.stabilityIndex?.[Math.min(i,detector.stabilityIndex.length-1)]??1
    });
  }

  const n=segments.length;
  const distances=Array.from({length:n},()=>new Float32Array(n));
  const similarities=Array.from({length:n},()=>new Float32Array(n));
  for(let i=0;i<n;i++){
    similarities[i][i]=1;
    for(let j=i+1;j<n;j++){
      const d=melodyDistance(segments[i],segments[j]);
      const sim=Math.exp(-4*d);
      distances[i][j]=distances[j][i]=d;
      similarities[i][j]=similarities[j][i]=sim;
    }
    if(i%8===0){
      setProgress(.90+.07*(i/Math.max(1,n)),`Comparing event-state ${i+1}/${n}…`);
      await nextTick();
    }
  }

  const clusters=[];
  for(let i=0;i<n;i++){
    let best=-1,bestSim=-1;
    for(let c=0;c<clusters.length;c++){
      const sim=similarities[i][clusters[c].medoid];
      if(sim>bestSim){bestSim=sim;best=c;}
    }
    if(best>=0&&bestSim>=opts.threshold)clusters[best].members.push(i);
    else clusters.push({members:[i],medoid:i});
  }

  for(const cluster of clusters){
    let bestMember=cluster.members[0],bestScore=-Infinity;
    for(const candidate of cluster.members){
      let score=0;
      for(const member of cluster.members)score+=similarities[candidate][member];
      if(score>bestScore){bestScore=score;bestMember=candidate;}
    }
    cluster.medoid=bestMember;
  }

  const coords=mdsOneDimension(
    clusters.map(a=>clusters.map(b=>distances[a.medoid][b.medoid]))
  );

  for(let c=0;c<clusters.length;c++){
    const cluster=clusters[c];
    const sorted=cluster.members.slice().sort(
      (a,b)=>segments[a].beatIndex-segments[b].beatIndex
    );
    const occurrences=[];
    for(const member of sorted){
      const s=segments[member],last=occurrences[occurrences.length-1];
      if(last&&s.beatIndex<=last.lastBeat+1){
        last.end=s.end;
        last.lastBeat=s.beatIndex;
        last.members.push(member);
      }else{
        occurrences.push({
          start:s.start,end:s.end,
          firstBeat:s.beatIndex,lastBeat:s.beatIndex,
          members:[member]
        });
      }
    }
    cluster.occurrences=occurrences;
    cluster.repeated=occurrences.length>=2;
    cluster.label=groupLabel(c);
    cluster.coordinate=coords[c]??.5;
  }

  for(let i=0;i<n;i++){
    const ci=clusters.findIndex(c=>c.members.includes(i));
    const cluster=clusters[ci];
    let repeatScore=0,nearest=null;
    for(let j=0;j<n;j++){
      if(i===j||Math.abs(segments[i].beatIndex-segments[j].beatIndex)<=opts.contextBeats)continue;
      if(similarities[i][j]>repeatScore){
        repeatScore=similarities[i][j];
        nearest=j;
      }
    }
    const simToMedoid=similarities[i][cluster.medoid]||1;
    const sign=((i*2654435761)>>>0)%2?1:-1;
    Object.assign(segments[i],{
      melodyValue:clamp(cluster.coordinate+sign*(1-simToMedoid)*.05,0,1),
      cluster:ci,
      group:cluster.repeated?cluster.label:null,
      repeated:cluster.repeated,
      repeatScore,
      nearest
    });
  }

  return {
    mode:"adaptive-event-synchronous",
    eventTimes,
    beatTimes:eventTimes,
    beats:eventTimes.length,
    bpm:60/Math.max(.001,detector.medianInterval),
    medianBeatInterval:detector.medianInterval,
    timingVariation:detector.timingVariation,
    beatConfidence:detector.confidence,
    eventDensity:detector.eventDensity,
    requestedStateChange:detector.requestedStateChange,
    effectiveStateChange:detector.effectiveStateChange,
    minimumStateChange:detector.minimumStateChange,
    targetEventDensity:detector.targetEventDensity,
    autoRelaxed:detector.autoRelaxed,
    densityTargetReached:detector.densityTargetReached,
    averageStateChange:detector.averageStateChange,
    candidateCount:detector.candidateCount,
    contextBeats:opts.contextBeats,
    threshold:opts.threshold,
    transposeInvariant:opts.transposeInvariant,
    sensitivity:opts.sensitivity,
    minimumGapMs:opts.minimumGapMs,
    segments,
    clusters:clusters.map((c,index)=>({
      index,
      label:c.label,
      coordinate:c.coordinate,
      repeated:c.repeated,
      members:c.members,
      occurrences:c.occurrences,
      averageSimilarity:c.members.length<=1?1:
        c.members.reduce((sum,i)=>sum+(similarities[i][c.medoid]||0),0)/c.members.length
    })),
    repeatedGroups:clusters.filter(c=>c.repeated).length
  };
}

function consolidateEvents(frames, frameDur){
  const out=[];
  let current=null;
  for(let i=0;i<frames.length;i++){
    const note=frames[i].foreground;
    if(note===null){
      if(current){current.end=frames[i].time;out.push(current);current=null;}
      continue;
    }
    if(!current || current.midi!==note){
      if(current){current.end=frames[i].time;out.push(current);}
      current={midi:note,note:midiToName(note),start:frames[i].time,end:frames[i].time+frameDur,
               confidenceSum:frames[i].confidence,count:1};
    }else{
      current.end=frames[i].time+frameDur;
      current.confidenceSum+=frames[i].confidence;current.count++;
    }
  }
  if(current) out.push(current);
  return out.filter(e=>e.end-e.start>=frameDur*1.5).map(e=>({
    midi:e.midi,note:e.note,start:+e.start.toFixed(3),end:+e.end.toFixed(3),
    duration:+(e.end-e.start).toFixed(3),confidence:+(e.confidenceSum/e.count).toFixed(3)
  }));
}

function eventWindowBounds(currentTime,forceStart=false){
  const P=analysis?.patterns;
  if(!P?.eventTimes?.length)return {start:0,end:analysis?.duration||1};
  const times=P.eventTimes;
  const visible=Math.max(4,+els.visibleBeats.value);
  let current=0;
  while(current+1<times.length&&times[current+1]<=currentTime)current++;
  const lead=forceStart?0:Math.floor(visible*.28);
  const first=clamp(current-lead,0,Math.max(0,times.length-1));
  const last=clamp(first+visible-1,0,times.length-1);
  const previousGap=first>0?times[first]-times[first-1]:P.medianBeatInterval;
  const nextGap=last+1<times.length?times[last+1]-times[last]:P.medianBeatInterval;
  return {
    start:Math.max(0,times[first]-.35*Math.max(.04,previousGap)),
    end:Math.min(analysis.duration,times[last]+.75*Math.max(.04,nextGap))
  };
}

function ensureTickAudio(){
  if(!tickAudioContext){
    tickAudioContext=new (window.AudioContext||window.webkitAudioContext)();

    tickMasterGain=tickAudioContext.createGain();
    tickMasterGain.gain.value=1;

    // Catch extreme 5× boosts without harsh digital clipping.
    tickLimiter=tickAudioContext.createDynamicsCompressor();
    tickLimiter.threshold.value=-8;
    tickLimiter.knee.value=6;
    tickLimiter.ratio.value=18;
    tickLimiter.attack.value=.002;
    tickLimiter.release.value=.08;

    tickMasterGain.connect(tickLimiter);
    tickLimiter.connect(tickAudioContext.destination);

    // Reusable short noise burst makes the click audible on phone speakers.
    const length=Math.max(1,Math.floor(tickAudioContext.sampleRate*.055));
    tickNoiseBuffer=tickAudioContext.createBuffer(1,length,tickAudioContext.sampleRate);
    const data=tickNoiseBuffer.getChannelData(0);
    for(let i=0;i<length;i++){
      const env=Math.exp(-i/(length*.14));
      data[i]=(Math.random()*2-1)*env;
    }
  }
  if(tickAudioContext.state==="suspended")return tickAudioContext.resume();
  return Promise.resolve();
}

function playTick(strength=.8){
  if(!els.tickEnabled.checked)return;
  ensureTickAudio().then(()=>{
    const now=tickAudioContext.currentTime+.004;
    const volume=+els.tickVolume.value;
    const accent=clamp(strength,0,1);

    // Noise transient.
    const noise=tickAudioContext.createBufferSource();
    noise.buffer=tickNoiseBuffer;

    const noiseFilter=tickAudioContext.createBiquadFilter();
    noiseFilter.type="bandpass";
    noiseFilter.frequency.value=2200;
    noiseFilter.Q.value=.7;

    const noiseGain=tickAudioContext.createGain();
    const noiseLevel=(.30+.34*accent)*volume;
    noiseGain.gain.setValueAtTime(Math.max(.0001,noiseLevel),now);
    noiseGain.gain.exponentialRampToValueAtTime(.0001,now+.045);

    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(tickMasterGain);

    // Short pitched body underneath the noise.
    const osc=tickAudioContext.createOscillator();
    const oscGain=tickAudioContext.createGain();
    osc.type="square";
    osc.frequency.setValueAtTime(1750,now);
    osc.frequency.exponentialRampToValueAtTime(900,now+.032);

    const toneLevel=(.14+.18*accent)*volume;
    oscGain.gain.setValueAtTime(Math.max(.0001,toneLevel),now);
    oscGain.gain.exponentialRampToValueAtTime(.0001,now+.04);

    osc.connect(oscGain);
    oscGain.connect(tickMasterGain);

    noise.start(now);
    noise.stop(now+.055);
    osc.start(now);
    osc.stop(now+.045);
  }).catch(err=>{
    console.warn("Tick audio could not start:",err);
    els.status.textContent="Tap “Test / enable tık” once to unlock click audio.";
  });
}

function resetTickCursor(time=els.audio.currentTime||0){
  const times=analysis?.patterns?.eventTimes||[];
  nextTickEventIndex=0;
  while(nextTickEventIndex<times.length&&times[nextTickEventIndex]<time-.06){
    nextTickEventIndex++;
  }
  lastTickPlaybackTime=time-.06;
}

function processPlaybackTicks(){
  if(!analysis?.patterns||els.audio.paused||!els.tickEnabled.checked)return;
  const times=analysis.patterns.eventTimes||[];
  const now=els.audio.currentTime;

  if(now<lastTickPlaybackTime-.08||now-lastTickPlaybackTime>1){
    resetTickCursor(now);
    return;
  }

  while(nextTickEventIndex<times.length&&times[nextTickEventIndex]<=now+.055){
    const eventTime=times[nextTickEventIndex];
    if(eventTime>=lastTickPlaybackTime-.08){
      const segment=analysis.patterns.segments?.[nextTickEventIndex];
      playTick(Math.max(segment?.beatStrength??.7,segment?.stateChange??0));
    }
    nextTickEventIndex++;
  }
  lastTickPlaybackTime=now;
}

function setInitialBeatView(){
  if(!analysis?.patterns){
    view={start:0,end:analysis?.duration||1};
    return;
  }
  view=eventWindowBounds(0,true);
  if(view.end-view.start<.1)view.end=Math.min(analysis.duration,view.start+.1);
  lastFollowStart=-1;
}

function updateFollowWindow(force=false){
  if(!analysis?.patterns||!els.autoFollow.checked)return false;
  const target=eventWindowBounds(els.audio.currentTime,false);
  if(force){
    view=target;
  }else{
    const easing=.16;
    view.start+=(target.start-view.start)*easing;
    view.end+=(target.end-view.end)*easing;
  }
  const changed=
    Math.abs(target.start-view.start)>.001||
    Math.abs(target.end-view.end)>.001||
    force;
  lastFollowStart=view.start;
  return changed;
}

function updatePlayhead(){
  if(!analysis)return;
  const rect=els.canvas.getBoundingClientRect();
  const x=42+(els.audio.currentTime-view.start)/(view.end-view.start)*(rect.width-50);
  els.playhead.style.display=(x>=42&&x<=rect.width-8)?"block":"none";
  els.playhead.style.left=x+"px";
}

function followLoop(){
  if(els.audio.paused){followRaf=0;return;}
  processPlaybackTicks();
  if(updateFollowWindow())draw();
  updatePlayhead();
  followRaf=requestAnimationFrame(followLoop);
}

function renderAll(){
  if(!analysis) return;
  const P=analysis.patterns;
  els.coverage.textContent=Math.round(analysis.coverage*100)+"%";
  els.phrases.textContent=P?.beats ?? P?.segments.length ?? "—";
  els.repeatGroups.textContent=P?.repeatedGroups ?? "—";
  const repeated=P?.segments.filter(s=>s.repeated).length||0;
  els.repeatedShare.textContent=P?.segments.length?Math.round(100*repeated/P.segments.length)+"%":"—";
  els.events.textContent=analysis.events.length;
  els.fps.textContent=Math.round(analysis.framesPerSecond);
  els.bpmBadge.textContent=P?`Median gap: ${P.medianBeatInterval.toFixed(3)}s`:"Median gap: —";
  els.beatConfidenceBadge.textContent=P?`Detector confidence: ${Math.round(P.beatConfidence*100)}%`:"Detector confidence: —";
  els.windowBadge.textContent=P
    ? `Gate: ${P.requestedStateChange.toFixed(2)}${P.autoRelaxed?"→"+P.effectiveStateChange.toFixed(2):""} • ${P.eventDensity.toFixed(2)}/s`
    : "Gate: —";
  renderTable();
  draw();
}

function renderTable(){
  if(!analysis) return;
  if(viewMode==="pitch"){
    const rows=analysis.events.slice(0,80).map(e=>`
      <tr><td>${e.note}</td><td>${e.start.toFixed(2)}s</td><td>${e.end.toFixed(2)}s</td>
      <td>${e.duration.toFixed(2)}s</td><td>${Math.round(e.confidence*100)}%</td></tr>`).join("");
    els.results.innerHTML=analysis.events.length?`
      <h3>Foreground note events</h3>
      <table><thead><tr><th>Note</th><th>Start</th><th>End</th><th>Length</th><th>Confidence</th></tr></thead>
      <tbody>${rows}</tbody></table>`:`<div class="empty">No foreground events passed the current thresholds.</div>`;
    return;
  }

  const P=analysis.patterns;
  if(!P || !P.segments.length){
    els.results.innerHTML=`<div class="empty">Not enough tracked melody to form phrase patterns.</div>`;
    return;
  }
  const repeated=P.clusters.filter(c=>c.repeated);
  const groupRows=repeated.map(c=>{
    const times=c.occurrences.map(o=>o.start.toFixed(1)+"s").join(", ");
    return `<tr><td>${c.label}</td><td>${c.occurrences.length}</td>
      <td>${c.coordinate.toFixed(3)}</td><td>${Math.round(c.averageSimilarity*100)}%</td><td>${times}</td></tr>`;
  }).join("");

  const phraseRows=P.segments.slice(0,100).map(s=>{
    const near=s.nearest===null?"—":P.segments[s.nearest].start.toFixed(1)+"s";
    return `<tr><td>#${s.beatIndex+1} • ${s.start.toFixed(2)}s</td>
      <td>${s.melodyValue.toFixed(3)}</td><td>${s.group||"unique"}</td>
      <td>${Math.round(s.repeatScore*100)}%</td><td>${near}</td></tr>`;
  }).join("");

  els.results.innerHTML=`
    <h3>Repeating event-state groups</h3>
    ${groupRows?`<table><thead><tr><th>Group</th><th>Occurrences</th><th>Height</th><th>Within-group</th><th>Starts</th></tr></thead><tbody>${groupRows}</tbody></table>`
      :`<div class="note">No separated event-state repeats crossed the current similarity threshold. Lower the grouping threshold slightly or increase the similarity context.</div>`}
    <h3>Per-event melody coordinates</h3>
    <table><thead><tr><th>Event / time</th><th>Melody value</th><th>Group</th><th>Best repeat</th><th>Nearest</th></tr></thead>
    <tbody>${phraseRows}</tbody></table>`;
}

function draw(){
  if(viewMode==="similarity") drawSimilarity();
  else drawPitch();
}

function drawPitch(){
  const c=els.canvas, rect=c.getBoundingClientRect(), dpr=devicePixelRatio||1;
  c.width=Math.max(1,Math.floor(rect.width*dpr)); c.height=Math.max(1,Math.floor(rect.height*dpr));
  const g=c.getContext("2d"); g.scale(dpr,dpr);
  const W=rect.width,H=rect.height, left=42,bottom=24,top=10,right=8;
  const plotW=W-left-right, plotH=H-top-bottom;
  g.fillStyle="#050b09";g.fillRect(0,0,W,H);
  if(!analysis) return;
  const minM=analysis.minMidi,maxM=analysis.maxMidi;
  const xFor=t=>left+(t-view.start)/(view.end-view.start)*plotW;
  const yFor=m=>top+(maxM-m)/(maxM-minM)*plotH;

  // No-dominant foreground regions.
  g.fillStyle="rgba(150,160,156,.10)";
  let runStart=null;
  analysis.frames.forEach((f,i)=>{
    const no=f.foreground===null;
    if(no&&runStart===null)runStart=f.time;
    if((!no||i===analysis.frames.length-1)&&runStart!==null){
      const end=no?f.time+analysis.hopSize/analysis.sampleRate:f.time;
      g.fillRect(xFor(runStart),top,xFor(end)-xFor(runStart),plotH);
      runStart=null;
    }
  });

  // Piano grid.
  g.font="10px system-ui";g.textAlign="right";g.textBaseline="middle";
  for(let m=minM;m<=maxM;m++){
    const y=yFor(m);
    if(m%12===0){
      g.strokeStyle="rgba(255,255,255,.14)";g.beginPath();g.moveTo(left,y);g.lineTo(W-right,y);g.stroke();
      g.fillStyle="#90a69c";g.fillText(midiToName(m),left-6,y);
    }else if([1,3,6,8,10].includes(m%12)){
      g.strokeStyle="rgba(255,255,255,.035)";g.beginPath();g.moveTo(left,y);g.lineTo(W-right,y);g.stroke();
    }
  }
  const secStep=(view.end-view.start)>90?10:(view.end-view.start)>30?5:1;
  g.textAlign="center";g.textBaseline="top";
  for(let s=Math.ceil(view.start/secStep)*secStep;s<=view.end;s+=secStep){
    const x=xFor(s);g.strokeStyle="rgba(255,255,255,.08)";g.beginPath();g.moveTo(x,top);g.lineTo(x,H-bottom);g.stroke();
    g.fillStyle="#90a69c";g.fillText(s+"s",x,H-bottom+5);
  }

  // Stable layers.
  const layerColors=["#73a9ff","#c28cff","#ffb66e"];
  analysis.layers.forEach((path,k)=>{
    g.strokeStyle=layerColors[k%layerColors.length];g.lineWidth=1.35;g.globalAlpha=.70;
    g.beginPath();let pen=false;
    path.forEach((m,i)=>{
      if(m===null){pen=false;return;}
      const t=analysis.frames[i].time,x=xFor(t),y=yFor(m);
      if(x<left||x>W-right){pen=false;return;}
      if(!pen){g.moveTo(x,y);pen=true}else g.lineTo(x,y);
    });g.stroke();
  });
  g.globalAlpha=1;

  // Dominant foreground.
  g.strokeStyle="#72f4b2";g.lineWidth=3;g.beginPath();let pen=false;
  analysis.frames.forEach(f=>{
    if(f.foreground===null){pen=false;return;}
    const x=xFor(f.time),y=yFor(f.foreground);
    if(x<left||x>W-right){pen=false;return;}
    if(!pen){g.moveTo(x,y);pen=true}else g.lineTo(x,y);
  });g.stroke();

  g.strokeStyle="#294239";g.strokeRect(left,top,plotW,plotH);
}


function drawSimilarity(){
  const c=els.canvas, rect=c.getBoundingClientRect(), dpr=devicePixelRatio||1;
  c.width=Math.max(1,Math.floor(rect.width*dpr)); c.height=Math.max(1,Math.floor(rect.height*dpr));
  const g=c.getContext("2d"); g.scale(dpr,dpr);
  const W=rect.width,H=rect.height,left=42,bottom=24,top=12,right=8;
  const plotW=W-left-right,plotH=H-top-bottom;
  g.fillStyle="#050b09";g.fillRect(0,0,W,H);
  if(!analysis?.patterns) return;
  const P=analysis.patterns;
  const xFor=t=>left+(t-view.start)/(view.end-view.start)*plotW;
  const yFor=v=>top+(1-v)*plotH;

  g.font="10px system-ui";
  g.textBaseline="middle";g.textAlign="right";
  for(let v=0;v<=1.001;v+=.25){
    const y=yFor(v);
    g.strokeStyle="rgba(255,255,255,.10)";
    g.beginPath();g.moveTo(left,y);g.lineTo(W-right,y);g.stroke();
    g.fillStyle="#90a69c";g.fillText(v.toFixed(2),left-6,y);
  }

  g.textAlign="center";g.textBaseline="top";
  const beatTimes=P.eventTimes||P.beatTimes||[];
  for(let i=0;i<beatTimes.length;i++){
    const t=beatTimes[i];if(t<view.start||t>view.end)continue;
    const x=xFor(t),strong=i%4===0;
    g.strokeStyle=strong?"rgba(255,255,255,.16)":"rgba(255,255,255,.065)";
    g.beginPath();g.moveTo(x,top);g.lineTo(x,H-bottom);g.stroke();
    if(strong||(+els.visibleBeats.value<=12)){g.fillStyle="#90a69c";g.fillText(`E${i+1}`,x,H-bottom+4);}
  }

  // Timeline path through melody-similarity space.
  const visible=P.segments.filter(s=>s.end>=view.start&&s.start<=view.end);
  if(visible.length){
    g.strokeStyle="rgba(180,205,194,.28)";g.lineWidth=1;
    g.beginPath();
    visible.forEach((s,i)=>{
      const x=xFor(s.center),y=yFor(s.melodyValue);
      if(i===0)g.moveTo(x,y);else g.lineTo(x,y);
    });
    g.stroke();
  }

  for(const s of visible){
    const x1=xFor(s.start),x2=xFor(s.end),x=xFor(s.start),y=yFor(s.melodyValue);
    g.strokeStyle=s.repeated?"#72f4b2":"#73a9ff";
    g.globalAlpha=.25+.65*Math.max(s.activity,s.stateChange);
    g.lineWidth=s.repeated?3:2;
    g.beginPath();g.moveTo(x1,y);g.lineTo(x2,y);g.stroke();

    const radius=2.5+2.6*s.repeatScore+2.8*s.stateChange;
    g.fillStyle=s.repeated?"#72f4b2":"#73a9ff";
    g.beginPath();g.arc(x,y,radius,0,Math.PI*2);g.fill();
    if(s.group){
      g.globalAlpha=1;
      g.fillStyle="#effff7";g.font="bold 10px system-ui";
      g.textAlign="center";g.textBaseline="bottom";
      g.fillText(s.group,x,y-radius-3);
    }
  }
  g.globalAlpha=1;
  g.strokeStyle="#294239";g.lineWidth=1;g.strokeRect(left,top,plotW,plotH);
}

els.visibleBeats.addEventListener("input",()=>{if(analysis){if(!updateFollowWindow(true))setInitialBeatView();draw();updatePlayhead();}});
els.visibleBeatsNum.addEventListener("input",()=>{if(analysis){if(!updateFollowWindow(true))setInitialBeatView();draw();updatePlayhead();}});
els.autoFollow.addEventListener("change",()=>{if(analysis&&els.autoFollow.checked){updateFollowWindow(true);draw();updatePlayhead();}});
els.testTickBtn.addEventListener("click",async()=>{
  els.tickEnabled.checked=true;
  try{
    await ensureTickAudio();
    playTick(1);
    setTimeout(()=>playTick(.72),180);
    els.status.textContent=`Tık enabled at ${(+els.tickVolume.value).toFixed(2)}× gain.`;
  }catch(err){
    console.error(err);
    els.status.textContent="Could not unlock click audio in this browser.";
  }
});

els.tickEnabled.addEventListener("change",()=>{
  if(els.tickEnabled.checked){
    ensureTickAudio();
    resetTickCursor();
  }
});


window.addEventListener("resize",draw);
els.canvas.addEventListener("click",e=>{
  if(!analysis) return;
  const rect=els.canvas.getBoundingClientRect();
  const time=view.start+clamp((e.clientX-42)/(rect.width-50),0,1)*(view.end-view.start);
  if(viewMode==="similarity"&&analysis.patterns?.segments.length){
    let nearest=analysis.patterns.segments[0];
    for(const s of analysis.patterns.segments)
      if(Math.abs(s.center-time)<Math.abs(nearest.center-time)) nearest=s;
    els.audio.currentTime=nearest.start;
    els.status.textContent=`Event ${nearest.beatIndex+1} • change ${nearest.stateChange.toFixed(2)} • gate ${analysis.patterns.effectiveStateChange.toFixed(2)} • melody ${nearest.melodyValue.toFixed(3)}`;
  }else{
    els.audio.currentTime=time;
  }
});

els.audio.addEventListener("play",()=>{
  ensureTickAudio();
  resetTickCursor(els.audio.currentTime);
  if(!followRaf)followRaf=requestAnimationFrame(followLoop);
});
els.audio.addEventListener("timeupdate",()=>{if(!analysis)return;if(els.autoFollow.checked&&els.audio.paused){updateFollowWindow(true);draw();}updatePlayhead();});
els.audio.addEventListener("seeking",()=>{
  resetTickCursor(els.audio.currentTime);
  if(analysis&&els.autoFollow.checked){updateFollowWindow(true);draw();}
  updatePlayhead();
});
els.audio.addEventListener("pause",()=>{
  if(followRaf){cancelAnimationFrame(followRaf);followRaf=0;}
  resetTickCursor(els.audio.currentTime);
  updatePlayhead();
});

function download(name, text, type){
  const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

        stateChange:+s.stateChange.toFixed(4),
        stabilityIndex:+s.stabilityIndex.toFixed(4),
        melodyValue:+s.melodyValue.toFixed(4),group:s.group,

      }))
    }:null,
    frames:analysis.frames.map(f=>({time:+f.time.toFixed(3),foreground:f.foreground,
      foregroundName:f.foreground===null?null:midiToName(f.foreground),
      confidence:+f.confidence.toFixed(3),layers:f.layers}))
  };
  download("adaptive-event-melody-analysis.json",JSON.stringify(compact,null,2),"application/json");
}
function exportCSV(){
  if(analysis.patterns?.segments.length){
    const P=analysis.patterns;
    const lines=["event,start,end,melody_value,group,repeat_score,nearest_event,nearest_start",
      ...P.segments.map(s=>`${s.beatIndex+1},${s.start.toFixed(3)},${s.end.toFixed(3)},${s.stateChange.toFixed(4)},${s.stabilityIndex.toFixed(4)},${s.melodyValue.toFixed(4)},${s.group||""},${s.repeatScore.toFixed(4)},${s.nearest===null?"":P.segments[s.nearest].beatIndex+1},${s.nearest===null?"":P.segments[s.nearest].start.toFixed(3)}`)];
    download("adaptive-event-melody-states.csv",lines.join("\n"),"text/csv");
  }else{
    const lines=["note,midi,start,end,duration,confidence",...analysis.events.map(e=>
      `${e.note},${e.midi},${e.start},${e.end},${e.duration},${e.confidence}`)];
    download("foreground-note-events.csv",lines.join("\n"),"text/csv");
  }
}

function makeDemoWav(){
  const sr=22050,dur=14,n=sr*dur,data=new Float32Array(n);
  const melody=[60,64,67,69,67,64,62,60,72,69,67,64,62,64];
  function tone(t,f,amp){
    // Mildly harmonic synth, intentionally not perfectly clean.
    return amp*(Math.sin(2*Math.PI*f*t)+.32*Math.sin(2*Math.PI*f*2*t)+.14*Math.sin(2*Math.PI*f*3*t));
  }
  for(let i=0;i<n;i++){
    const t=i/sr, beat=Math.floor(t*2), local=(t*2)%1;
    const env=Math.min(1,local*12)*Math.exp(-local*1.5);
    let s=0;
    if(t<4.5 || t>9.3){
      const m=melody[beat%melody.length];
      s+=tone(t,midiToHz(m),.27*env);
      [48,55,60].forEach(mm=>s+=tone(t,midiToHz(mm),.055));
    }else{
      // Equal-strength moving chord texture: deliberately ambiguous.
      const chord=(beat%2)?[55,59,62,67]:[53,57,60,65];
      chord.forEach(mm=>s+=tone(t,midiToHz(mm),.105*(.75+.25*env)));
    }
    s+=.012*(Math.random()*2-1);
    data[i]=clamp(s,-.95,.95);
  }
  const wav=encodeWav(data,sr);
  const blob=new Blob([wav],{type:"audio/wav"});
  blob.name="adaptive-event-melody-demo.wav";
  return blob;
}
function encodeWav(samples,sr){
  const b=new ArrayBuffer(44+samples.length*2),v=new DataView(b);
  const str=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  str(0,"RIFF");v.setUint32(4,36+samples.length*2,true);str(8,"WAVE");str(12,"fmt ");
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
  str(36,"data");v.setUint32(40,samples.length*2,true);
  let o=44;for(const x of samples){v.setInt16(o,Math.round(clamp(x,-1,1)*32767),true);o+=2;}
  return b;
}
