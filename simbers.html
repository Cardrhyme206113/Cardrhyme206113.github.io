function segmentEventStrength(segment){
  return (
    .56*(segment.stateChange||0)+
    .29*(segment.beatStrength||0)+
    .15*(segment.activity||0)
  );
}

function filterSegmentsByMinimumGap(segments,minimumGapMs,duration){
  const minimumGap=minimumGapMs/1000;
  const accepted=[];

  for(const segment of segments){
    if(segment.start<.20||segment.start>=duration-.02)continue;

    const last=accepted[accepted.length-1];
    if(!last||segment.start-last.start>=minimumGap){
      accepted.push(segment);
      continue;
    }

    // Two events are too close for this difficulty. Keep whichever one has
    // the stronger actual state change / detected attack.
    const currentStrength=segmentEventStrength(segment);
    const lastStrength=segmentEventStrength(last);
    if(
      currentStrength>lastStrength+.0001 ||
      (
        Math.abs(currentStrength-lastStrength)<=.0001 &&
        segment.start<last.start
      )
    ){
      accepted[accepted.length-1]=segment;
    }
  }

  return accepted;
}

function flowTierForSignature(config,seed,signature){
  const random=hashString(
    `${seed}|${config.id}|${signature}|flow-tier`
  )/4294967296;

  let cursor=0;
  for(const tier of ["easy","medium","hard"]){
    cursor+=config.weights[tier]||0;
    if(random<cursor)return tier;
  }

  // Floating-point-safe fallback to the highest non-zero tier.
  if(config.weights.hard>0)return "hard";
  if(config.weights.medium>0)return "medium";
  return "easy";
}

function signatureAssignments(segments,seed,config){
  const clusterStats=new Map();

  for(let i=0;i<segments.length;i++){
    const segment=segments[i];
    const cluster=Number.isFinite(segment.cluster)?segment.cluster:i;

    if(!clusterStats.has(cluster)){
      clusterStats.set(cluster,{
        count:0,
        melody:0,
        state:0,
        gap:0
      });
    }

    const value=clusterStats.get(cluster);
    value.count++;
    value.melody+=segment.melodyValue||0;
    value.state+=segment.stateChange||0;

    const previous=i?segments[i-1]:null;
    value.gap+=previous
      ?Math.max(.05,segment.start-previous.start)
      :.5;
  }

  // Merge clusters with the same quantized signature. This is the consistency
  // rule: sufficiently similar signatures receive exactly the same flow.
  const signatureStats=new Map();
  for(const [cluster,value] of clusterStats){
    const melody=value.melody/value.count;
    const state=value.state/value.count;
    const gap=value.gap/value.count;
    const signature=[
      Math.round(melody*10),
      Math.round(state*8),
      Math.round(clamp(gap,.08,2)*4)
    ].join(":");

    if(!signatureStats.has(signature)){
      signatureStats.set(signature,{
        signature,
        count:0,
        clusters:[]
      });
    }
    const item=signatureStats.get(signature);
    item.count+=value.count;
    item.clusters.push(cluster);
  }

  const tiers=["easy","medium","hard"].filter(
    tier=>(config.weights[tier]||0)>0
  );
  const ordered=[...signatureStats.values()].sort((a,b)=>{
    const ah=hashString(
      `${seed}|${config.id}|${a.signature}|tier-order`
    );
    const bh=hashString(
      `${seed}|${config.id}|${b.signature}|tier-order`
    );
    return ah-bh||a.signature.localeCompare(b.signature);
  });

  const assignedEventCounts={easy:0,medium:0,hard:0};
  const patternBySignature=new Map();
  let processedEvents=0;

  for(const item of ordered){
    const nextProcessed=processedEvents+item.count;
    let bestTier=tiers[0];
    let bestError=Infinity;

    // Choose the tier that leaves the cumulative placed-event mix closest to
    // the requested percentages. This makes Expert+ converge toward 40% hard
    // by notes while preserving one tier per repeated signature.
    for(const tier of tiers){
      let error=0;
      for(const candidateTier of ["easy","medium","hard"]){
        const nextCount=
          assignedEventCounts[candidateTier]+
          (candidateTier===tier?item.count:0);
        const target=
          nextProcessed*(config.weights[candidateTier]||0);
        error+=Math.abs(nextCount-target);
      }

      error+=(
        hashString(
          `${seed}|${config.id}|${item.signature}|${tier}|mix-tie`
        )%1000
      )/1e7;

      if(error<bestError){
        bestError=error;
        bestTier=tier;
      }
    }

    assignedEventCounts[bestTier]+=item.count;
    processedEvents=nextProcessed;

    const pool=[...FLOW_PATTERNS,...COMPOUND_FLOW_PATTERNS].filter(
      pattern=>pattern.difficulty===bestTier
    );
    const chosen=pool[
      hashString(
        `${seed}|${config.id}|${item.signature}|${bestTier}|flow`
      )%pool.length
    ];
    patternBySignature.set(item.signature,chosen);
  }

  const assignments=new Map();
  for(const item of signatureStats.values()){
    const pattern=patternBySignature.get(item.signature);
    for(const cluster of item.clusters){
      assignments.set(cluster,pattern);
    }
  }

  return assignments;
}


function vectorAngle(dx,dy){
  const radians=Math.atan2(dx,dy);
  let degrees=radians*180/Math.PI;
  if(degrees<0)degrees+=360;
  return degrees;
}

function cutAngleFromCode(code){
  for(const key of Object.keys(CUT)){
    if(CUT[key].code===code)return CUT[key].deg;
  }
  return 180;
}

function arcMusicalContinuity(a,b){
  const melodyDiff=Math.abs(
    (a.segment?.melodyValue||0)-
    (b.segment?.melodyValue||0)
  );
  const stateDiff=Math.abs(
    (a.segment?.stateChange||0)-
    (b.segment?.stateChange||0)
  );
  const sameGroup=(
    a.segment?.group &&
    b.segment?.group &&
    a.segment.group===b.segment.group
  )?1:0;

  return clamp(
    .50*(1-clamp(melodyDiff/.42,0,1))+
    .30*(1-clamp(stateDiff/.38,0,1))+
    .20*sameGroup,
    0,1
  );
}

function arcMovementContinuity(a,b){
  const dx=b.lineIndex-a.lineIndex;
  const dy=b.lineLayer-a.lineLayer;
  const travelAngle=vectorAngle(dx,dy);
  const headAngle=cutAngleFromCode(a.cutDirection);
  const tailAngle=cutAngleFromCode(b.cutDirection);

  const headError=angleDistance(headAngle,travelAngle);
  const tailReturnError=angleDistance(
    tailAngle,
    (headAngle+180)%360
  );

  return {
    headError,
    tailReturnError,
    score:clamp(
      .68*(1-clamp(headError/115,0,1))+
      .32*(1-clamp(tailReturnError/115,0,1)),
      0,1
    )
  };
}

function arcSpacingContinuity(a,b,config){
  const gap=b.time-a.time;
  const distance=Math.hypot(
    b.lineIndex-a.lineIndex,
    b.lineLayer-a.lineLayer
  );

  const gapMiddle=(config.arcMinGap+config.arcMaxGap)/2;
  const gapRadius=Math.max(
    .04,
    (config.arcMaxGap-config.arcMinGap)/2
  );
  const gapScore=
    1-clamp(Math.abs(gap-gapMiddle)/gapRadius,0,1);

  // A visible but not huge move is the most readable arc.
  const distanceScore=
    1-clamp(Math.abs(distance-1.45)/1.65,0,1);

  return clamp(.65*gapScore+.35*distanceScore,0,1);
}

function arcTransitionKey(a,b){
  const aSignature=Number.isFinite(a.segment?.cluster)
    ?`c${a.segment.cluster}`
    :`g${a.segment?.group||Math.round((a.segment?.melodyValue||0)*8)}`;
  const bSignature=Number.isFinite(b.segment?.cluster)
    ?`c${b.segment.cluster}`
    :`g${b.segment?.group||Math.round((b.segment?.melodyValue||0)*8)}`;

  return [
    a.type,
    aSignature,
    bSignature,
    Math.round((b.time-a.time)*10),
    b.lineIndex-a.lineIndex,
    b.lineLayer-a.lineLayer
  ].join("|");
}

function makeArcCandidate(a,b,config){
  const gap=b.time-a.time;
  if(gap<config.arcMinGap||gap>config.arcMaxGap)return null;

  const distance=Math.hypot(
    b.lineIndex-a.lineIndex,
    b.lineLayer-a.lineLayer
  );
  if(distance<.55||distance>3.15)return null;

  const movement=arcMovementContinuity(a,b);
  const musical=arcMusicalContinuity(a,b);
  const spacing=arcSpacingContinuity(a,b,config);

  // A sustained/stable transition is more arc-like than two unrelated hits.
  const stateAverage=clamp(
    ((a.segment?.stateChange||0)+(b.segment?.stateChange||0))/2,
    0,1
  );
  const sustainedScore=1-stateAverage*.35;

  const score=
    .40*movement.score+
    .34*musical+
    .16*spacing+
    .10*sustainedScore;

  if(score<config.arcScoreFloor)return null;
  if(movement.headError>105)return null;

  return {
    a,
    b,
    key:arcTransitionKey(a,b),
    score
  };
}

function arcControlMultiplier(a,b){
  const gap=b.time-a.time;
  const distance=Math.hypot(
    b.lineIndex-a.lineIndex,
    b.lineLayer-a.lineLayer
  );
  return +clamp(
    .62+gap*.92+distance*.13,
    .65,
    1.42
  ).toFixed(3);
}

function candidateToV26Arc(candidate){
  const {a,b}=candidate;
  const multiplier=arcControlMultiplier(a,b);
  return {
    _colorType:a.type,
    _headTime:+a.time.toFixed(4),
    _headLineIndex:a.lineIndex,
    _headLineLayer:a.lineLayer,
    _headCutDirection:a.cutDirection,
    _headControlPointLengthMultiplier:multiplier,
    _tailTime:+b.time.toFixed(4),
    _tailLineIndex:b.lineIndex,
    _tailLineLayer:b.lineLayer,
    _tailCutDirection:b.cutDirection,
    _tailControlPointLengthMultiplier:multiplier,
    _sliderMidAnchorMode:0
  };
}

function buildArcsForDifficulty(generatedNotes,config,seed){
  const byHand=[
    generatedNotes
      .filter(note=>note.type===0)
      .sort((a,b)=>a.eventIndex-b.eventIndex),
    generatedNotes
      .filter(note=>note.type===1)
      .sort((a,b)=>a.eventIndex-b.eventIndex)
  ];

  for(const handNotes of byHand){
    for(let i=0;i<handNotes.length;i++){
      handNotes[i].handIndex=i;
    }
  }

  const eventCount=Math.max(
    0,
    ...generatedNotes.map(note=>note.eventIndex+1)
  );
  if(eventCount<2)return [];

  const cadence=Math.max(3,config.arcEveryEvents||5);
  const usedNodes=new Set();
  const selected=[];
  let previousSide=null;

  function naturalCandidate(head,tail){
    const gap=tail.time-head.time;
    if(gap<.12||gap>1.35)return null;

    const dx=tail.lineIndex-head.lineIndex;
    const dy=tail.lineLayer-head.lineLayer;
    const distance=Math.hypot(dx,dy);
    if(distance<.45||distance>3.25)return null;

    const travelAngle=vectorAngle(dx,dy);
    const headAngle=cutAngleFromCode(head.cutDirection);
    const tailAngle=cutAngleFromCode(tail.cutDirection);

    // The head cut should generally launch toward the tail.
    const launchError=angleDistance(headAngle,travelAngle);

    // The tail should not require a violent wrist twist relative to the
    // previous swing. Opposite/parity-return directions are preferred.
    const parityError=angleDistance(
      tailAngle,
      (headAngle+180)%360
    );

    const movementScore=clamp(
      .62*(1-clamp(launchError/120,0,1))+
      .38*(1-clamp(parityError/120,0,1)),
      0,1
    );

    const melodyDiff=Math.abs(
      (head.segment?.melodyValue||0)-
      (tail.segment?.melodyValue||0)
    );
    const stateDiff=Math.abs(
      (head.segment?.stateChange||0)-
      (tail.segment?.stateChange||0)
    );
    const sameGroup=(
      head.segment?.group &&
      tail.segment?.group &&
      head.segment.group===tail.segment.group
    )?1:0;

    const musicalScore=clamp(
      .48*(1-clamp(melodyDiff/.45,0,1))+
      .32*(1-clamp(stateDiff/.40,0,1))+
      .20*sameGroup,
      0,1
    );

    const idealGap=(config.arcMinGap+config.arcMaxGap)/2;
    const gapRadius=Math.max(
      .08,
      (config.arcMaxGap-config.arcMinGap)/2
    );
    const timingScore=1-clamp(
      Math.abs(gap-idealGap)/gapRadius,
      0,1
    );

    const distanceScore=1-clamp(
      Math.abs(distance-1.45)/1.65,
      0,1
    );

    const score=
      .44*movementScore+
      .32*musicalScore+
      .14*timingScore+
      .10*distanceScore;

    return {
      a:head,
      b:tail,
      score,
      launchError,
      parityError,
      gap,
      distance
    };
  }

  function windowCandidates(windowStart,windowEnd){
    const candidates=[];

    for(let side=0;side<2;side++){
      const handNotes=byHand[side];

      for(let i=0;i<handNotes.length-1;i++){
        const head=handNotes[i];
        if(
          head.eventIndex<windowStart ||
          head.eventIndex>=windowEnd
        )continue;

        // Consider the immediate next note and one-note skip. The skip makes
        // arcs visible without turning them into random long connections.
        for(let skip=1;skip<=2;skip++){
          const tail=handNotes[i+skip];
          if(!tail)continue;

          const headKey=`${side}:${head.handIndex}`;
          const tailKey=`${side}:${tail.handIndex}`;
          if(
            usedNodes.has(headKey) ||
            usedNodes.has(tailKey)
          )continue;

          const candidate=naturalCandidate(head,tail);
          if(candidate)candidates.push(candidate);
        }
      }
    }

    return candidates.sort((a,b)=>
      b.score-a.score ||
      a.launchError-b.launchError ||
      a.gap-b.gap
    );
  }

  for(
    let windowStart=0;
    windowStart<eventCount-1;
    windowStart+=cadence
  ){
    const windowEnd=Math.min(
      eventCount,
      windowStart+cadence
    );
    const candidates=windowCandidates(
      windowStart,
      windowEnd
    );
    if(!candidates.length)continue;

    let chosen=candidates[0];

    // Prefer alternating hands only when the opposite-hand candidate is
    // nearly as natural as the absolute best one.
    if(previousSide!==null){
      const opposite=candidates.find(candidate=>
        candidate.a.type!==previousSide &&
        candidate.score>=chosen.score-.075
      );
      if(opposite)chosen=opposite;
    }

    usedNodes.add(
      `${chosen.a.type}:${chosen.a.handIndex}`
    );
    usedNodes.add(
      `${chosen.b.type}:${chosen.b.handIndex}`
    );
    selected.push(chosen);
    previousSide=chosen.a.type;
  }

  // Deterministic fallback for a valid but unusual map: select the strongest
  // natural transition globally so the output does not silently contain zero
  // arcs. This is still score-based, not random.
  if(!selected.length){
    const all=[];
    for(const handNotes of byHand){
      for(let i=0;i<handNotes.length-1;i++){
        for(let skip=1;skip<=2;skip++){
          const tail=handNotes[i+skip];
          if(!tail)continue;
          const candidate=naturalCandidate(
            handNotes[i],
            tail
          );
          if(candidate)all.push(candidate);
        }
      }
    }

    all.sort((a,b)=>
      b.score-a.score ||
      a.launchError-b.launchError
    );
    if(all.length)selected.push(all[0]);
  }

  return selected
    .map(candidateToV26Arc)
    .sort((a,b)=>
      a._headTime-b._headTime ||
      a._colorType-b._colorType
    );
}


function cutVectorFromCode(code){
  for(const key of Object.keys(CUT)){
    if(CUT[key].code===code)return CUT[key];
  }
  return CUT.down;
}

function signStep(value){
  if(value>.15)return 1;
  if(value<-.15)return -1;
  return 0;
}

function gridCellKey(time,x,y){
  return `${time.toFixed(3)}:${x}:${y}`;
}

function noteNearBombCell(generatedNotes,time,x,y,margin){
  return generatedNotes.some(note=>
    note.lineIndex===x &&
    note.lineLayer===y &&
    Math.abs(note.time-time)<margin
  );
}

function bombNearExistingBomb(bombs,time,x,y,minimumTime){
  return bombs.some(bomb=>{
    const spatial=
      Math.abs(bomb._lineIndex-x)+
      Math.abs(bomb._lineLayer-y);
    return (
      Math.abs(bomb._time-time)<minimumTime &&
      spatial<=1
    );
  });
}

function noteTouchesArc(note,sliders){
  return sliders.some(slider=>
    slider._colorType===note.type &&
    (
      (
        Math.abs(slider._headTime-note.time)<.001 &&
        slider._headLineIndex===note.lineIndex &&
        slider._headLineLayer===note.lineLayer
      ) ||
      (
        Math.abs(slider._tailTime-note.time)<.001 &&
        slider._tailLineIndex===note.lineIndex &&
        slider._tailLineLayer===note.lineLayer
      )
    )
  );
}

function bombStyleForSignature(note,config,seed){
  const signature=[
    note.segment?.group||"",
    Number.isFinite(note.segment?.cluster)
      ?note.segment.cluster
      :Math.round((note.segment?.melodyValue||0)*10),
    note.type,
    note.cutDirection
  ].join("|");

  const value=hashString(
    `${seed}|${config.id}|${signature}|bomb-style`
  )/4294967296;

  if(value<config.bombDirectRate)return "direct";
  if(
    value<
    config.bombDirectRate+config.bombFollowRate
  )return "follow";
  return "side";
}

function bombPositionCandidates(note,style){
  const cut=cutVectorFromCode(note.cutDirection);
  const sx=signStep(cut.dx);
  const sy=signStep(cut.dy);

  const perpendiculars=[
    [-sy,sx],
    [sy,-sx]
  ];

  const candidates=[];

  function add(x,y,label){
    x=clamp(x,0,3);
    y=clamp(y,0,2);
    if(
      !candidates.some(candidate=>
        candidate.x===x&&candidate.y===y
      )
    ){
      candidates.push({x,y,label});
    }
  }

  if(style==="direct"){
    // Truly just behind the cut note.
    add(note.lineIndex,note.lineLayer,"direct");
    add(
      note.lineIndex+perpendiculars[0][0],
      note.lineLayer+perpendiculars[0][1],
      "side-fallback"
    );
    add(
      note.lineIndex+perpendiculars[1][0],
      note.lineLayer+perpendiculars[1][1],
      "side-fallback"
    );
  }else if(style==="follow"){
    // In or beside the natural follow-through path. More finicky, mostly
    // reserved for Expert and Expert+.
    add(
      note.lineIndex+sx,
      note.lineLayer+sy,
      "follow"
    );
    add(note.lineIndex,note.lineLayer,"direct-fallback");
    add(
      note.lineIndex+perpendiculars[0][0],
      note.lineLayer+perpendiculars[0][1],
      "side-fallback"
    );
  }else{
    // Safer Hard-style bomb: adjacent to the swing rather than directly
    // occupying its center.
    add(
      note.lineIndex+perpendiculars[0][0],
      note.lineLayer+perpendiculars[0][1],
      "side"
    );
    add(
      note.lineIndex+perpendiculars[1][0],
      note.lineLayer+perpendiculars[1][1],
      "side"
    );
    add(note.lineIndex,note.lineLayer,"direct-fallback");
  }

  return candidates;
}

function bombCandidateScore(note,nextEventTime,config,seed){
  const availableGap=Math.max(
    0,
    nextEventTime-note.time
  );
  const requiredGap=(config.bombLagMax||.2)+.055;
  const gapScore=clamp(
    availableGap/Math.max(.001,requiredGap),
    0,1
  );

  const segment=note.segment||{};
  const attackScore=clamp(
    .48*(segment.stateChange||0)+
    .32*(segment.beatStrength||0)+
    .20*(segment.activity||0),
    0,1
  );

  const flowBonus=
    note.flowDifficulty==="hard"
      ?.16
      :note.flowDifficulty==="medium"
        ?.07
        :0;

  const deterministicTie=(
    hashString(
      `${seed}|${config.id}|${note.eventIndex}|${note.type}|bomb-score`
    )%1000
  )/1000000;

  return (
    .58*attackScore+
    .27*gapScore+
    flowBonus+
    deterministicTie
  );
}

function buildBombsForDifficulty(
  generatedNotes,
  sliders,
  config,
  seed
){
  if(!config.bombEveryEvents)return [];

  const byEvent=new Map();
  for(const note of generatedNotes){
    if(!byEvent.has(note.eventIndex)){
      byEvent.set(note.eventIndex,[]);
    }
    byEvent.get(note.eventIndex).push(note);
  }

  const eventIndices=[...byEvent.keys()]
    .sort((a,b)=>a-b);
  const eventTimes=new Map(
    eventIndices.map(index=>[
      index,
      byEvent.get(index)[0].time
    ])
  );

  const bombs=[];
  const cadence=Math.max(
    5,
    config.bombEveryEvents
  );
  let previousBombHand=null;

  for(
    let windowStart=0;
    windowStart<eventIndices.length;
    windowStart+=cadence
  ){
    const windowIndices=eventIndices.slice(
      windowStart,
      windowStart+cadence
    );
    const candidates=[];

    for(const eventIndex of windowIndices){
      const eventNotes=byEvent.get(eventIndex)||[];
      const nextIndex=eventIndices.find(
        index=>index>eventIndex
      );
      const nextEventTime=nextIndex===undefined
        ?Infinity
        :eventTimes.get(nextIndex);

      for(const note of eventNotes){
        if(noteTouchesArc(note,sliders))continue;

        const score=bombCandidateScore(
          note,
          nextEventTime,
          config,
          seed
        );

        candidates.push({
          note,
          nextEventTime,
          score
        });
      }
    }

    candidates.sort((a,b)=>
      b.score-a.score ||
      a.note.time-b.note.time
    );

    let placed=null;

    for(const candidate of candidates){
      const note=candidate.note;

      // Alternate which hand receives the trick when another near-equal
      // candidate exists.
      if(
        previousBombHand!==null &&
        note.type===previousBombHand
      ){
        const oppositeExists=candidates.some(other=>
          other.note.type!==previousBombHand &&
          other.score>=candidate.score-.08
        );
        if(oppositeExists)continue;
      }

      const style=bombStyleForSignature(
        note,
        config,
        seed
      );
      const randomUnit=hashString(
        `${seed}|${config.id}|${note.eventIndex}|${note.type}|bomb-lag`
      )/4294967296;
      let lag=
        config.bombLagMin+
        randomUnit*(
          config.bombLagMax-
          config.bombLagMin
        );

      const reactionMargin=
        config.id==="expertPlus"
          ?.045
          :config.id==="expert"
            ?.060
            :.075;

      if(Number.isFinite(candidate.nextEventTime)){
        const maximumLag=
          candidate.nextEventTime-
          note.time-
          reactionMargin;
        lag=Math.min(lag,maximumLag);
      }

      if(lag<config.bombLagMin*.82)continue;

      const bombTime=note.time+lag;
      const positions=bombPositionCandidates(
        note,
        style
      );

      for(const position of positions){
        if(
          noteNearBombCell(
            generatedNotes,
            bombTime,
            position.x,
            position.y,
            config.id==="expertPlus"
              ?.075
              :.095
          )
        )continue;

        if(
          bombNearExistingBomb(
            bombs,
            bombTime,
            position.x,
            position.y,
            config.id==="expertPlus"
              ?.28
              :.38
          )
        )continue;

        placed={
          _time:+bombTime.toFixed(4),
          _lineIndex:position.x,
          _lineLayer:position.y,
          _type:3,
          _cutDirection:0,
          sourceEventIndex:note.eventIndex,
          sourceHand:note.type,
          style:position.label
        };
        break;
      }

      if(placed)break;
    }

    if(placed){
      bombs.push(placed);
      previousBombHand=placed.sourceHand;
    }
  }

  return bombs
    .map(bomb=>({
      _time:bomb._time,
      _lineIndex:bomb._lineIndex,
      _lineLayer:bomb._lineLayer,
      _type:3,
      _cutDirection:0
    }))
    .sort((a,b)=>a._time-b._time);
}


function defaultLightValue(useRed,style){
  const base=useRed?5:1;
  const offsets={
    static:0,
    flash:1,
    fade:2,
    transition:3
  };
  return base+offsets[style];
}

function defaultLightIsRed(segment,index,sectionIndex){
  const melodyBucket=Math.round(
    clamp(segment?.melodyValue||0,0,1)*8
  );
  const clusterBucket=Number.isFinite(segment?.cluster)
    ?segment.cluster
    :index;
  return Math.abs(
    melodyBucket+
    clusterBucket+
    sectionIndex
  )%2===1;
}

function buildVanillaLightingEvents(result,seed){
  const segments=result.patterns?.segments||[];
  const duration=Math.max(.1,result.duration||0);
  const eventMap=new Map();
  const lastTimeByType=new Map();

  function pushLight(
    time,
    type,
    value,
    brightness=1,
    force=false
  ){
    time=+clamp(time,0,duration).toFixed(4);

    if(!force){
      const previous=lastTimeByType.get(type);
      if(
        Number.isFinite(previous)&&
        time-previous<.085
      )return;
    }

    const event={
      _time:time,
      _type:type,
      _value:value,
      _floatValue:+clamp(
        brightness,
        0,
        1.25
      ).toFixed(3)
    };

    eventMap.set(
      `${time.toFixed(4)}|${type}`,
      event
    );
    lastTimeByType.set(type,time);
  }

  const allLightGroups=[0,1,2,3,4];
  for(const type of allLightGroups){
    pushLight(0,type,0,0,true);
  }

  if(!segments.length){
    return [...eventMap.values()];
  }

  let lastSection=-1;
  let previousEventTime=segments[0].start;
  let strongestRecentTime=-999;

  for(let i=0;i<segments.length;i++){
    const segment=segments[i];
    const time=clamp(
      segment.start||0,
      0,
      duration
    );
    const nextTime=i+1<segments.length
      ?segments[i+1].start
      :duration;
    const sectionIndex=Math.floor(time/8);
    const strength=clamp(
      segmentEventStrength(segment),
      0,
      1
    );
    const state=clamp(
      segment.stateChange||0,
      0,
      1
    );
    const beat=clamp(
      segment.beatStrength||0,
      0,
      1
    );
    const activity=clamp(
      segment.activity||0,
      0,
      1
    );
    const useRed=defaultLightIsRed(
      segment,
      i,
      sectionIndex
    );

    const newSection=sectionIndex!==lastSection;
    if(newSection||state>.78){
      const groups=[0,1,4];
      for(let g=0;g<groups.length;g++){
        pushLight(
          time+g*.012,
          groups[g],
          defaultLightValue(
            g%2? !useRed:useRed,
            "transition"
          ),
          .50+.12*strength
        );
      }
      lastSection=sectionIndex;
    }

    const signatureHash=hashString([
      seed,
      sectionIndex,
      Number.isFinite(segment.cluster)
        ?segment.cluster
        :i,
      Math.round((segment.melodyValue||0)*12)
    ].join("|"));
    const mainType=[0,1,2,3,4][signatureHash%5];

    let style="transition";
    if(strength>.78&&time-strongestRecentTime>.18){
      style="flash";
      strongestRecentTime=time;
    }else if(strength>.52||state>.48||beat>.58){
      style="fade";
    }else if(activity>.42){
      style="static";
    }

    const brightness=clamp(
      .50+.52*strength+.14*activity,
      .46,
      1.18
    );

    pushLight(
      time,
      mainType,
      defaultLightValue(useRed,style),
      brightness
    );

    if(strength>.42||beat>.50){
      const sideType=(
        Math.round((segment.melodyValue||0)*10)+
        sectionIndex
      )%2?2:3;
      pushLight(
        time+.012,
        sideType,
        defaultLightValue(
          !useRed,
          strength>.68?"flash":"fade"
        ),
        brightness*.88
      );
    }

    if(strength>.72||state>.78){
      pushLight(
        time+.024,
        4,
        defaultLightValue(useRed,strength>.84?"flash":"fade"),
        Math.min(1.24,brightness+.10)
      );
      pushLight(
        time+.036,
        0,
        defaultLightValue(!useRed,"fade"),
        brightness
      );
    }

    const gapFromPrevious=time-previousEventTime;
    if(gapFromPrevious<.30&&strength>.48){
      const rapidType=i%2?2:3;
      pushLight(
        time+.058,
        rapidType,
        defaultLightValue(i%2?useRed:!useRed,"fade"),
        .66+.26*strength
      );
    }

    if(nextTime-time>1.15&&activity<.48){
      const quietTime=Math.min(
        duration,
        time+Math.min(.72,(nextTime-time)*.48)
      );
      pushLight(quietTime,mainType,0,0);
      pushLight(quietTime+.02,i%2?2:3,0,0);
    }

    previousEventTime=time;
  }

  const endTime=Math.max(0,duration-.025);
  for(const type of allLightGroups){
    pushLight(endTime,type,0,0,true);
  }

  return [...eventMap.values()].sort((a,b)=>
    a._time-b._time||a._type-b._type
  );
}


function wallOverlapsInteractiveObject(
  start,
  end,
  sliders,
  bombs
){
  const margin=.055;

  if(
    bombs.some(bomb=>
      bomb._time>=start-margin &&
      bomb._time<=end+margin
    )
  )return true;

  if(
    sliders.some(slider=>
      slider._headTime<end+margin &&
      slider._tailTime>start-margin
    )
  )return true;

  return false;
}

function wallGapScore(
  currentNotes,
  nextNotes,
  gap,
  config,
  seed
){
  const current=currentNotes[0];
  const next=nextNotes[0];
  const segment=current?.segment||{};
  const nextSegment=next?.segment||{};

  const attackScore=clamp(
    .50*(segment.stateChange||0)+
    .30*(segment.beatStrength||0)+
    .20*(segment.activity||0),
    0,1
  );

  const gapScore=clamp(
    (
      gap-
      (config.wallMinimumGap||.5)
    )/.75,
    0,1
  );

  const phraseChange=clamp(
    Math.abs(
      (segment.melodyValue||0)-
      (nextSegment.melodyValue||0)
    )/.45,
    0,1
  );

  const deterministicTie=(
    hashString(
      `${seed}|${config.id}|${current.eventIndex}|wall-score`
    )%1000
  )/1000000;

  return (
    .46*attackScore+
    .36*gapScore+
    .18*phraseChange+
    deterministicTie
  );
}

function buildWallsForDifficulty(
  generatedNotes,
  sliders,
  bombs,
  config,
  seed
){
  if(!config.wallEveryEvents)return [];

  const byEvent=new Map();
  for(const note of generatedNotes){
    if(!byEvent.has(note.eventIndex)){
      byEvent.set(note.eventIndex,[]);
    }
    byEvent.get(note.eventIndex).push(note);
  }

  const eventIndices=[...byEvent.keys()]
    .sort((a,b)=>a-b);

  const candidates=[];

  for(let i=0;i<eventIndices.length-1;i++){
    const eventIndex=eventIndices[i];
    const nextEventIndex=eventIndices[i+1];
    const currentNotes=byEvent.get(eventIndex);
    const nextNotes=byEvent.get(nextEventIndex);
    const currentTime=currentNotes[0].time;
    const nextTime=nextNotes[0].time;
    const gap=nextTime-currentTime;

    if(gap<(config.wallMinimumGap||.5))continue;
    if(currentTime<1.8)continue;

    const startOffset=
      config.id==="expertPlus"
        ?.085
        :config.id==="expert"
          ?.10
          :.12;

    const nextNoteMargin=
      config.id==="expertPlus"
        ?.075
        :config.id==="expert"
          ?.09
          :.11;

    const maximumDuration=
      gap-startOffset-nextNoteMargin;

    if(
      maximumDuration<
      config.wallMinDuration
    )continue;

    const start=currentTime+startOffset;
    const duration=clamp(
      maximumDuration*.76,
      config.wallMinDuration,
      config.wallMaxDuration
    );
    const end=start+duration;

    if(
      wallOverlapsInteractiveObject(
        start,
        end,
        sliders,
        bombs
      )
    )continue;

    candidates.push({
      eventIndex,
      start,
      duration,
      gap,
      score:wallGapScore(
        currentNotes,
        nextNotes,
        gap,
        config,
        seed
      )
    });
  }

  if(!candidates.length)return [];

  const cadence=Math.max(
    8,
    config.wallEveryEvents
  );
  const walls=[];
  let lastWallEnd=-999;
  let previousSide=null;

  for(
    let windowStart=0;
    windowStart<eventIndices.length;
    windowStart+=cadence
  ){
    const windowEnd=windowStart+cadence;

    const pool=candidates
      .filter(candidate=>
        candidate.eventIndex>=windowStart &&
        candidate.eventIndex<windowEnd &&
        candidate.start-lastWallEnd>=(
          config.id==="expertPlus"
            ?1.65
            :config.id==="expert"
              ?2.15
              :2.75
        )
      )
      .sort((a,b)=>
        b.score-a.score ||
        b.gap-a.gap
      );

    if(!pool.length)continue;

    const chosen=pool[0];
    const styleValue=hashString(
      `${seed}|${config.id}|${chosen.eventIndex}|wall-style`
    )/4294967296;

    const canCrouch=(
      (config.crouchWallRate||0)>0 &&
      chosen.gap>=(
        config.crouchMinimumGap||.75
      )
    );

    const crouch=(
      canCrouch &&
      styleValue<config.crouchWallRate
    );

    let wall;

    if(crouch){
      wall={
        _type:2,
        _time:+chosen.start.toFixed(4),
        _duration:+chosen.duration.toFixed(4),
        _lineIndex:0,
        _lineLayer:2,
        _width:4,
        _height:3
      };
    }else{
      let side;

      if(previousSide===null){
        side=hashString(
          `${seed}|${config.id}|first-wall-side`
        )%2;
      }else{
        side=1-previousSide;
      }

      const width=clamp(
        config.wallWidth||1,
        1,
        2
      );

      wall={
        _type:2,
        _time:+chosen.start.toFixed(4),
        _duration:+chosen.duration.toFixed(4),
        _lineIndex:side===0
          ?0
          :4-width,
        _lineLayer:0,
        _width:width,
        _height:5
      };

      previousSide=side;
    }

    walls.push(wall);
    lastWallEnd=chosen.start+chosen.duration;
  }

  return walls.sort((a,b)=>a._time-b._time);
}

function notationImportance(segment,previousSegment,nextSegment){
  const melodyJump=Math.max(
    Math.abs((segment.melodyValue||0)-(previousSegment?.melodyValue||0)),
    Math.abs((segment.melodyValue||0)-(nextSegment?.melodyValue||0))
  );

  return clamp(
    .40*(segment.stateChange||0)+
    .28*(segment.beatStrength||0)+
    .18*(segment.activity||0)+
    .14*clamp(melodyJump/.45,0,1),
    0,1
  );
}

function buildNotationSections(segments,config,seed){
  if(segments.length<6)return [];

  const threshold=
    config.id==="expertPlus"?.62:
    config.id==="expert"?.65:
    config.id==="hard"?.68:
    config.id==="medium"?.71:.74;
  const cooldown=
    config.id==="expertPlus"?11:
    config.id==="expert"?13:
    config.id==="hard"?15:
    config.id==="medium"?17:19;

  const scores=segments.map((segment,index)=>notationImportance(
    segment,
    segments[index-1],
    segments[index+1]
  ));

  const candidates=[];
  for(let i=2;i<segments.length-2;i++){
    const score=scores[i];
    if(score<threshold)continue;
    if(score<scores[i-1]||score<scores[i+1])continue;
    candidates.push({index:i,score});
  }

  candidates.sort((a,b)=>b.score-a.score||a.index-b.index);
  const chosen=[];
  const targetCount=Math.max(1,Math.ceil(segments.length/(cooldown*2.2)));

  for(const candidate of candidates){
    if(chosen.some(section=>Math.abs(section.peak-candidate.index)<cooldown))continue;

    const span=clamp(
      Math.round(4+(candidate.score-threshold)*10),
      4,
      8
    );
    const start=Math.max(0,candidate.index-1);
    const end=Math.min(segments.length,start+span);
    chosen.push({peak:candidate.index,start,end,score:candidate.score});
    if(chosen.length>=targetCount)break;
  }

  chosen.sort((a,b)=>a.start-b.start);
  let hand=hashString(`${seed}|${config.id}|single-saber-first-hand`)%2;
  return chosen.map(section=>{
    const result={...section,hand};
    hand=1-hand;
    return result;
  });
}

function sectionLookup(sections,length){
  const lookup=new Array(length).fill(null);
  for(const section of sections){
    for(let i=section.start;i<section.end;i++)lookup[i]=section;
  }
  return lookup;
}

function buildBeatmap(result,seed,config,lightingEvents,featureOptions){
  const allSegments=result.patterns?.segments||[];
  if(!allSegments.length){
    throw new Error("No beat events were detected.");
  }

  const segments=filterSegmentsByMinimumGap(
    allSegments,
    config.minimumGapMs,
    result.duration
  );
  if(!segments.length){
    throw new Error(
      `${config.label} produced no usable beat events.`
    );
  }

  const assignments=signatureAssignments(
    segments,
    seed,
    config
  );
  const previous={left:null,right:null};
  const generatedNotes=[];
  const flowCounts=new Map();
  const flowTierCounts={
    easy:0,
    medium:0,
    hard:0
  };

  let lastWasCompound=false;
  let boundaryTargets={left:null,right:null};

  for(let i=0;i<segments.length;i++){
    const segment=segments[i];
    const cluster=Number.isFinite(segment.cluster)
      ?segment.cluster
      :i;
    const assignedPattern=assignments.get(cluster);
    let pattern=assignedPattern;
    let compoundWindow=null;

    if(pattern?.steps){
      compoundWindow=compoundFlowWindow(
        segments,
        i,
        pattern,
        result.duration
      );

      // Keep explicit streams separated by at least one ordinary flow so the
      // exit reversal from one stream can become the entry reversal of the next.
      if(lastWasCompound||!compoundWindow){
        pattern=normalFallbackForCompound(
          assignedPattern,
          seed,
          config,
          cluster,
          i
        );
        compoundWindow=null;
      }
    }

    if(pattern.steps){
      retunePreviousForCompound(
        generatedNotes,
        previous,
        pattern.steps,
        compoundWindow.start
      );

      for(
        let stepIndex=0;
        stepIndex<pattern.steps.length;
        stepIndex++
      ){
        const step=pattern.steps[stepIndex];
        const time=+(
          compoundWindow.start+
          compoundWindow.spacing*stepIndex
        ).toFixed(4);
        const eventIndex=
          i+
          compoundWindow.span*
          stepIndex/
          pattern.steps.length;

        if(step.l){
          generatedNotes.push({
            eventIndex,
            time,
            lineIndex:step.l[0],
            lineLayer:step.l[1],
            type:0,
            cutDirection:CUT[step.l[2]].code,
            flowDifficulty:pattern.difficulty,
            segment,
            compoundFlow:pattern.id,
            compoundStep:stepIndex
          });
        }

        if(step.r){
          generatedNotes.push({
            eventIndex,
            time,
            lineIndex:step.r[0],
            lineLayer:step.r[1],
            type:1,
            cutDirection:CUT[step.r[2]].code,
            flowDifficulty:pattern.difficulty,
            segment,
            compoundFlow:pattern.id,
            compoundStep:stepIndex
          });
        }
      }

      const leftExit=explicitHandStep(pattern.steps,"l",true);
      const rightExit=explicitHandStep(pattern.steps,"r",true);

      if(leftExit){
        const lastTime=+(
          compoundWindow.start+
          compoundWindow.spacing*leftExit.index
        ).toFixed(4);
        previous.left={
          column:leftExit.note[0],
          row:leftExit.note[1],
          direction:leftExit.note[2],
          time:lastTime
        };
        boundaryTargets.left=oppositeDirection(leftExit.note[2]);
      }

      if(rightExit){
        const lastTime=+(
          compoundWindow.start+
          compoundWindow.spacing*rightExit.index
        ).toFixed(4);
        previous.right={
          column:rightExit.note[0],
          row:rightExit.note[1],
          direction:rightExit.note[2],
          time:lastTime
        };
        boundaryTargets.right=oppositeDirection(rightExit.note[2]);
      }

      flowCounts.set(
        pattern.id,
        (flowCounts.get(pattern.id)||0)+1
      );
      flowTierCounts[pattern.difficulty]++;
      lastWasCompound=true;

      // A two-beat compound flow owns the intermediate detected event.
      i+=compoundWindow.span-1;
      continue;
    }

    const time=+segment.start.toFixed(4);
    const chosen=chooseDirections(
      pattern,
      previous,
      `${seed}|${config.id}|${cluster}|${i}`,
      time,
      boundaryTargets
    );
    boundaryTargets={left:null,right:null};

    const safePattern=chosen.pattern;
    generatedNotes.push({
      eventIndex:i,
      time,
      lineIndex:safePattern.l[0],
      lineLayer:safePattern.l[1],
      type:0,
      cutDirection:CUT[chosen.leftDirection].code,
      flowDifficulty:pattern.difficulty,
      segment
    });
    generatedNotes.push({
      eventIndex:i,
      time,
      lineIndex:safePattern.r[0],
      lineLayer:safePattern.r[1],
      type:1,
      cutDirection:CUT[chosen.rightDirection].code,
      flowDifficulty:pattern.difficulty,
      segment
    });

    previous.left={
      column:safePattern.l[0],
      row:safePattern.l[1],
      direction:chosen.leftDirection,
      time
    };
    previous.right={
      column:safePattern.r[0],
      row:safePattern.r[1],
      direction:chosen.rightDirection,
      time
    };

    flowCounts.set(
      pattern.id,
      (flowCounts.get(pattern.id)||0)+1
    );
    flowTierCounts[pattern.difficulty]++;
    lastWasCompound=false;
  }

  generatedNotes.sort(
    (a,b)=>a.time-b.time||a.type-b.type
  );

  const colorNotes=generatedNotes.map(note=>({
    _time:+note.time.toFixed(4),
    _lineIndex:note.lineIndex,
    _lineLayer:note.lineLayer,
    _type:note.type,
    _cutDirection:note.cutDirection
  }));

  const sliders=featureOptions.arcs
    ?buildArcsForDifficulty(
      generatedNotes,
      config,
      seed
    )
    :[];

  const bombs=featureOptions.bombs
    ?buildBombsForDifficulty(
      generatedNotes,
      sliders,
      config,
      seed
    )
    :[];

  const obstacles=featureOptions.walls
    ?buildWallsForDifficulty(
      generatedNotes,
      sliders,
      bombs,
      config,
      seed
    )
    :[];

  const notes=[
    ...colorNotes,
    ...bombs
  ].sort((a,b)=>
    a._time-b._time ||
    a._type-b._type
  );

  const activeStart=generatedNotes.length
    ?generatedNotes[0].time
    :0;
  const activeEnd=generatedNotes.length
    ?generatedNotes[generatedNotes.length-1].time
    :result.duration;
  const activeDuration=Math.max(
    1,
    activeEnd-activeStart
  );
  const nps=colorNotes.length/activeDuration;

  return {
    config,
    filename:config.filename,
    beatmap:{
      _version:"2.6.0",
      _notes:notes,
      _obstacles:obstacles,
      _sliders:sliders,
      _events:lightingEvents,
      _waypoints:[],
      _specialEventsKeywordFilters:{
        _keywords:[]
      },
      _customData:{
        _generator:
          "Beat Signature Natural Arc Multi-Difficulty HTML",
        _difficultyLabel:config.label,
        _minimumEventGapMs:config.minimumGapMs,
        _arcWindow:[
          config.arcMinGap,
          config.arcMaxGap
        ],
        _arcEveryEvents:featureOptions.arcs?config.arcEveryEvents:0,
        _arcAlgorithm:featureOptions.arcs
          ?"movement+timing+melody continuity"
          :"disabled",
        _bombAlgorithm:featureOptions.bombs&&config.bombEveryEvents
          ?"strong attack + follow-through space + next-note safety"
          :"disabled",
        _bombEveryEvents:featureOptions.bombs?config.bombEveryEvents:0,
        _wallAlgorithm:featureOptions.walls&&config.wallEveryEvents
          ?"strong accent + open gap + arc/bomb safety"
          :"disabled",
        _wallEveryEvents:featureOptions.walls?config.wallEveryEvents:0,
        _characteristic:"Standard",
        _lightingAlgorithm:
          "beat strength + default environment red/blue palette",
        _lightingCompatibility:
          "Info 2.0 + V2 events + DefaultEnvironment",
        _lightingEventCount:lightingEvents.length,
        _flowWeights:config.weights,
        _flowPatternCount:
          FLOW_PATTERNS.length+COMPOUND_FLOW_PATTERNS.length,
        _compoundFlowPatternCount:COMPOUND_FLOW_PATTERNS.length,
        _compoundFlowBoundaryRule:
          "exact reverse cuts immediately before and after explicit flows"
      }
    },
    noteCount:colorNotes.length,
    eventCount:new Set(generatedNotes.map(note=>note.eventIndex)).size,
    bombCount:bombs.length,
    wallCount:obstacles.length,
    arcCount:sliders.length,
    nps,
    activeDuration,
    characteristic:"Standard",
    usedFlowCount:flowCounts.size,
    usedFlowIds:[...flowCounts.keys()],
    flowTierCounts,
    sourceNotes:generatedNotes
  };
}

function filenameForCharacteristic(config,characteristic){
  if(characteristic==="Standard")return config.filename;
  if(/Standard\.dat$/i.test(config.filename)){
    return config.filename.replace(/Standard\.dat$/i,`${characteristic}.dat`);
  }
  return `${config.difficulty}${characteristic}.dat`;
}

function cloneJson(value){
  return JSON.parse(JSON.stringify(value));
}

function makeNoArrowsDifficulty(standard){
  const beatmap=cloneJson(standard.beatmap);

  for(const note of beatmap._notes){
    if(note._type===0||note._type===1)note._cutDirection=8;
  }
  for(const slider of beatmap._sliders||[]){
    slider._headCutDirection=8;
    slider._tailCutDirection=8;
  }

  beatmap._customData={
    ...beatmap._customData,
    _characteristic:"NoArrows",
    _dotNoteAlgorithm:"all color notes are directionless",
    _singleSaberAlgorithm:"disabled"
  };

  return {
    ...standard,
    characteristic:"NoArrows",
    filename:filenameForCharacteristic(standard.config,"NoArrows"),
    beatmap,
    sourceNotes:standard.sourceNotes.map(note=>({
      ...note,
      cutDirection:8
    }))
  };
}

function buildOneSaberDifficulty(
  standard,
  seed,
  lightingEvents,
  featureOptions
){
  const config=standard.config;
  const byEvent=new Map();

  for(const note of standard.sourceNotes){
    if(!byEvent.has(note.eventIndex))byEvent.set(note.eventIndex,[]);
    byEvent.get(note.eventIndex).push(note);
  }

  const eventIndices=[...byEvent.keys()].sort((a,b)=>a-b);
  const segments=eventIndices.map(index=>byEvent.get(index)[0].segment);
  const notationSections=buildNotationSections(segments,config,seed);
  const notationByEvent=sectionLookup(notationSections,segments.length);
  const generatedNotes=[];
  let sourceHand=hashString(`${seed}|${config.id}|one-saber-first-side`)%2;
  let activeSectionPeak=null;

  for(let localIndex=0;localIndex<eventIndices.length;localIndex++){
    const eventIndex=eventIndices[localIndex];
    const section=notationByEvent[localIndex];

    if(section&&section.peak!==activeSectionPeak){
      sourceHand=section.hand;
      activeSectionPeak=section.peak;
    }else if(!section){
      activeSectionPeak=null;
    }

    const eventNotes=byEvent.get(eventIndex);
    const source=(
      eventNotes.find(note=>note.type===sourceHand)||
      eventNotes[0]
    );

    generatedNotes.push({
      ...source,
      eventIndex:localIndex,
      type:0,
      oneSaberSourceHand:sourceHand,
      notationSection:section?.peak??null
    });
  }

  const colorNotes=generatedNotes.map(note=>({
    _time:+note.time.toFixed(4),
    _lineIndex:note.lineIndex,
    _lineLayer:note.lineLayer,
    _type:0,
    _cutDirection:note.cutDirection
  }));

  const sliders=featureOptions.arcs
    ?buildArcsForDifficulty(generatedNotes,config,seed)
    :[];
  const bombs=featureOptions.bombs
    ?buildBombsForDifficulty(generatedNotes,sliders,config,seed)
    :[];
  const obstacles=featureOptions.walls
    ?buildWallsForDifficulty(
      generatedNotes,
      sliders,
      bombs,
      config,
      seed
    )
    :[];

  const notes=[...colorNotes,...bombs].sort((a,b)=>
    a._time-b._time||a._type-b._type
  );
  const activeStart=generatedNotes.length?generatedNotes[0].time:0;
  const activeEnd=generatedNotes.length
    ?generatedNotes[generatedNotes.length-1].time
    :0;
  const activeDuration=Math.max(1,activeEnd-activeStart);
  const nps=colorNotes.length/activeDuration;

  return {
    config,
    characteristic:"OneSaber",
    filename:filenameForCharacteristic(config,"OneSaber"),
    beatmap:{
      _version:"2.6.0",
      _notes:notes,
      _obstacles:obstacles,
      _sliders:sliders,
      _events:lightingEvents,
      _waypoints:[],
      _specialEventsKeywordFilters:{_keywords:[]},
      _customData:{
        ...standard.beatmap._customData,
        _characteristic:"OneSaber",
        _dotNoteAlgorithm:"disabled",
        _singleSaberSections:notationSections.length,
        _singleSaberAlgorithm:
          "one saber switches between left-side and right-side source patterns at musically important sections"
      }
    },
    noteCount:colorNotes.length,
    eventCount:eventIndices.length,
    bombCount:bombs.length,
    wallCount:obstacles.length,
    arcCount:sliders.length,
    nps,
    activeDuration,
    usedFlowCount:standard.usedFlowCount,
    usedFlowIds:standard.usedFlowIds,
    flowTierCounts:standard.flowTierCounts,
    sourceNotes:generatedNotes
  };
}

function rotationValue(direction,degrees){
  if(direction<0)return degrees===30?2:3;
  return degrees===30?5:4;
}

function buildRotationDifficulty(standard,seed,characteristic){
  const config=standard.config;
  const beatmap=cloneJson(standard.beatmap);
  const byEvent=new Map();

  for(const note of standard.sourceNotes){
    if(!byEvent.has(note.eventIndex))byEvent.set(note.eventIndex,[]);
    byEvent.get(note.eventIndex).push(note);
  }

  const eventIndices=[...byEvent.keys()].sort((a,b)=>a-b);
  const segments=eventIndices.map(index=>byEvent.get(index)[0].segment);
  const notationSections=buildNotationSections(
    segments,
    config,
    `${seed}|${characteristic}|rotation-sections`
  );

  const rotationEvents=[];
  let cumulativeAngle=0;
  let spinDirection=(hashString(`${seed}|${config.id}|${characteristic}|direction`)%2)?1:-1;
  let previousPeakMelody=null;

  for(const section of notationSections){
    const localIndex=Math.min(
      Math.max(section.peak,0),
      eventIndices.length-1
    );
    const eventIndex=eventIndices[localIndex];
    const notes=byEvent.get(eventIndex)||[];
    const source=notes[0];
    if(!source)continue;

    const melody=source.segment?.melodyValue||0;
    const melodyDelta=previousPeakMelody===null
      ?0
      :melody-previousPeakMelody;
    previousPeakMelody=melody;

    const degrees=section.score>=.82?30:15;
    let direction;

    if(characteristic==="90Degree"){
      direction=Math.abs(melodyDelta)>=.08
        ?(melodyDelta>=0?1:-1)
        :(section.hand?1:-1);

      if(
        cumulativeAngle+direction*degrees>45||
        cumulativeAngle+direction*degrees< -45
      ){
        direction=-direction;
      }
    }else{
      // Keep a readable spin direction, but let major melody changes reverse it.
      if(Math.abs(melodyDelta)>=.32){
        spinDirection=melodyDelta>=0?1:-1;
      }
      direction=spinDirection;
    }

    rotationEvents.push({
      _time:+source.time.toFixed(4),
      _type:15,
      _value:rotationValue(direction,degrees)
    });
    cumulativeAngle+=direction*degrees;
  }

  beatmap._events=[
    ...(beatmap._events||[]),
    ...rotationEvents
  ].sort((a,b)=>
    a._time-b._time||a._type-b._type||a._value-b._value
  );
  beatmap._customData={
    ...beatmap._customData,
    _characteristic:characteristic,
    _rotationEventCount:rotationEvents.length,
    _rotationAlgorithm:
      "late 15/30 degree rotations at the same major song changes used for OneSaber hand switches",
    _rotationRange:characteristic==="90Degree"
      ?"clamped to -45..45 degrees"
      :"continuous 360-degree rotation"
  };

  return {
    ...standard,
    characteristic,
    filename:filenameForCharacteristic(config,characteristic),
    beatmap,
    rotationEventCount:rotationEvents.length
  };
}

function safeBaseName(name){
  const raw=(name||"Generated Song").replace(/\.[^.]+$/,"").trim()||"Generated Song";
  return raw.replace(/[\\/:*?"<>|]+/g,"_").slice(0,80);
}

    },
