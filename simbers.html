<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Simplified Sabers</title>
<style>
:root{
  color-scheme:dark;
  --bg-dark:#121212;
  --bg-panel:#1e1e1e;
  --text:#ffffff;
  --muted:#9a9a9a;
  --primary:#007bff;
  --primary-hover:#0067d8;
  --secondary:#3f464d;
  --secondary-hover:#58616a;
  --border:#333333;
}

*{
  box-sizing:border-box;
  min-width:0;
}

html,
body{
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
  background:var(--bg-dark);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
  position:relative;
  line-height:1.5;
}

body::before{display:none}

.app{
  width:100%;
  height:100vh;
  height:100dvh;
  display:grid;
  grid-template-rows:50% 50%;
  overflow:hidden;
  background:var(--bg-dark);
}

.app::before{display:none}

.card{
  position:relative;
  width:100%;
  height:50vh;
  height:50dvh;
  overflow:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px 24px;
  border:0;
  border-bottom:2px solid var(--border);
  border-radius:0;
  background:var(--bg-panel);
  box-shadow:none;
}

.card::before{display:none}

.uiCluster{
  position:relative;
  width:min(100%,620px);
  margin:auto;
  opacity:1;
  transform:translate3d(0,0,0);
  will-change:transform,opacity;
}

.titleRow{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:8px;
}

.brandMark{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:6px;
  margin:0;
}

.brandMark span{
  display:block;
  width:12px;
  height:32px;
  border-radius:2px;
  transform:skewX(-15deg);
  box-shadow:none;
}

.brandMark span:first-child{
  background:#ff0055;
}

.brandMark span:last-child{
  margin:0;
  transform:skewX(-15deg);
  background:#0084ff;
}

h1{
  margin:0;
  font-size:clamp(25px,5vw,31px);
  line-height:1;
  font-weight:800;
  letter-spacing:-.02em;
  text-transform:uppercase;
}

.subtitle{
  margin:0 0 22px;
  max-width:none;
  color:var(--muted);
  font-size:14px;
}

.actions{
  width:100%;
  display:grid;
  grid-template-columns:minmax(0,2fr) minmax(0,2fr) minmax(0,1.5fr) 44px;
  grid-template-areas:"upload create export clear";
  gap:8px;
  margin-bottom:18px;
}

.fileInput{
  position:absolute;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none;
}

.uploadButton,
button{
  width:100%;
  height:44px;
  min-height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 12px;
  border-radius:4px;
  font:700 13px/1 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  text-align:center;
  text-transform:uppercase;
  white-space:nowrap;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:background-color .18s ease,border-color .18s ease,opacity .18s ease;
}

.uploadButton{
  grid-area:upload;
  border:2px solid var(--border);
  background:transparent;
  color:var(--text);
}

.uploadButton:hover{
  background:rgba(255,255,255,.05);
  border-color:#666;
}

button{
  border:0;
  color:#fff;
  background:var(--primary);
  text-shadow:none;
  box-shadow:none;
}

button:hover:not(:disabled){
  background:var(--primary-hover);
}

#analyzeBtn{grid-area:create}

#viewerDownload{
  grid-area:export;
  background:var(--secondary);
}

#viewerDownload:hover:not(:disabled){
  background:var(--secondary-hover);
}

#viewerBack{
  grid-area:clear;
  padding:0;
  background:var(--secondary);
  font-size:21px;
  line-height:1;
}

#viewerBack:hover:not(:disabled){
  background:var(--secondary-hover);
}

button:active,
.uploadButton:active{
  transform:none;
}

button:disabled{
  opacity:.42;
  cursor:not-allowed;
}

.featureToggles{
  width:100%;
  display:flex;
  align-items:center;
  gap:8px;
  margin:0 0 18px;
}

.featureToggle{
  position:relative;
  flex:1 1 0;
  width:auto;
  height:48px;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

.featureToggle input{
  position:absolute;
  width:1px;
  height:1px;
  opacity:0;
  pointer-events:none;
}

.featureIcon{
  width:100%;
  height:100%;
  display:grid;
  place-items:center;
  border:2px solid var(--border);
  border-radius:4px;
  color:var(--muted);
  background:transparent;
  box-shadow:none;
  transform:none;
  transition:color .18s ease,border-color .18s ease,background-color .18s ease,opacity .18s ease;
}

.featureIcon svg{
  width:24px;
  height:24px;
  fill:none;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.featureToggle input:checked + .featureIcon{
  color:#fff;
  border-color:var(--primary);
  background:rgba(0,123,255,.10);
  box-shadow:none;
}

.featureToggle input:focus-visible + .featureIcon{
  outline:2px solid #fff;
  outline-offset:2px;
}

.featureToggle:active .featureIcon{transform:none}
.featureToggle input:disabled + .featureIcon{opacity:.38;cursor:not-allowed}

.statusBar{
  position:relative;
  width:100%;
  height:38px;
  overflow:hidden;
  border:1px solid #2b2b2b;
  border-radius:4px;
  background:#101010;
}

.statusBar progress{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  margin:0;
  appearance:none;
  border:0;
  border-radius:0;
  background:#101010;
  accent-color:var(--primary);
}

.statusBar progress::-webkit-progress-bar{
  background:#101010;
}

.statusBar progress::-webkit-progress-value{
  background:var(--primary);
}

.statusBar progress::-moz-progress-bar{
  background:var(--primary);
}

.mapStatus{
  position:absolute;
  z-index:1;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 12px;
  color:#fff;
  font:700 11px/1.2 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  letter-spacing:.05em;
  text-align:center;
  text-transform:uppercase;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  pointer-events:none;
  text-shadow:0 1px 2px rgba(0,0,0,.95);
}

#mapStatus{
  display:flex;
}

#npsNote{
  display:none!important;
}

.hidden{display:none!important}

.viewerShell,
.viewerShell.open{
  position:relative;
  width:100%;
  height:50vh;
  height:50dvh;
  max-height:50vh;
  max-height:50dvh;
  margin:0;
  overflow:hidden;
  opacity:1;
  border:0;
  border-top:0;
  border-radius:0;
  background:#000;
}


.viewerShell iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  min-height:0;
  display:block;
  border:0;
  background:#000;
}

.viewerEmptyState{
  position:absolute;
  z-index:2;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:40px;
  text-align:center;
  color:#454545;
  font-size:16px;
  font-weight:500;
  letter-spacing:.05em;
  text-transform:uppercase;
  background:#000;
  backdrop-filter:none;
  -webkit-backdrop-filter:none;
}

.viewerShell.empty .viewerEmptyState{display:flex}
.viewerShell.empty iframe{filter:none}
.viewerToolbar{display:none!important}
body.viewer-open{align-items:flex-start}

@media(max-width:620px){
  .card{
    align-items:flex-start;
    padding:18px 16px 14px;
  }

  .uiCluster{margin:auto}

  h1{font-size:clamp(22px,7vw,28px)}
  .subtitle{margin-bottom:14px;font-size:12px}

  .actions{
    grid-template-columns:minmax(0,1fr) minmax(0,1fr) 44px;
    grid-template-areas:
      "upload create create"
      "export export clear";
    margin-bottom:12px;
  }

  .uploadButton,
  button{
    height:40px;
    min-height:40px;
    font-size:12px;
  }

  .featureToggles{margin-bottom:12px}
  .featureToggle{height:42px}
  .featureIcon svg{width:22px;height:22px}
  .statusBar{height:36px}
}

@media(min-width:900px) and (min-aspect-ratio:4/3){
  .app{
    grid-template-columns:50% 50%;
    grid-template-rows:100%;
  }

  .card{
    width:100%;
    height:100vh;
    height:100dvh;
    padding:40px;
    border-right:2px solid var(--border);
    border-bottom:0;
  }

  .viewerShell,
  .viewerShell.open{
    width:100%;
    height:100vh;
    height:100dvh;
    max-height:100vh;
    max-height:100dvh;
  }
}
</style>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="uiCluster">
        <div class="titleRow">
        <div class="brandMark" aria-hidden="true">
          <span></span><span></span>
        </div>
        <h1>Simplified Sabers</h1>
      </div>
      <p class="subtitle">Upload a song and create a complete five-difficulty Beat Saber map.</p>

      <div class="actions">
        <input id="file" class="fileInput" type="file" accept="audio/*">
        <label class="uploadButton" for="file">Upload Song</label>
        <button id="analyzeBtn" disabled>Create Map</button>
        <button id="viewerDownload" type="button">Export ZIP</button>
        <button id="viewerBack" type="button" title="Clear map" aria-label="Clear map">×</button>
      </div>

      <div class="featureToggles" role="group" aria-label="Map objects">
        <label class="featureToggle" title="Bombs">
          <input id="featureBombs" type="checkbox" checked aria-label="Bombs">
          <span class="featureIcon" aria-hidden="true">
            <svg viewBox="0 0 48 48" focusable="false">
              <circle cx="19.5" cy="29" r="12.5"></circle>
              <rect x="27" y="14" width="8" height="7" rx="1.5" transform="rotate(-45 31 17.5)"></rect>
              <path d="M34 14c3-4 6-4 9-7M43 7l3-3m-3 3 4 1m-4-1 1 4"></path>
            </svg>
          </span>
        </label>

        <label class="featureToggle" title="Walls">
          <input id="featureWalls" type="checkbox" checked aria-label="Walls">
          <span class="featureIcon" aria-hidden="true">
            <svg viewBox="0 0 48 48" focusable="false">
              <rect x="10" y="9" width="28" height="30" rx="3"></rect>
              <path d="M10 20h28M10 30h28M19 9v11M29 20v10M19 30v9"></path>
            </svg>
          </span>
        </label>

        <label class="featureToggle" title="Arcs">
          <input id="featureArcs" type="checkbox" checked aria-label="Arcs">
          <span class="featureIcon" aria-hidden="true">
            <svg viewBox="0 0 48 48" focusable="false">
              <rect x="7" y="28" width="9" height="9" rx="2"></rect>
              <rect x="32" y="11" width="9" height="9" rx="2"></rect>
              <path d="M14 30C19 17 25 14 34 17"></path>
            </svg>
          </span>
        </label>

      </div>

      <div class="statusBar" role="status" aria-live="polite">
        <progress id="progress" max="1" value="0"></progress>
        <div id="mapStatus" class="mapStatus">Ready. Select a song file.</div>
      </div>
      <div id="npsNote" class="mapStatus"></div>
      </div>
    </section>

    <audio id="audio" class="hidden" controls></audio>

    <section class="graph hidden">
      <div class="graphLabel">
        <span>Beat</span>
        <span>Similarity</span>
      </div>
      <div class="canvasWrap">
        <canvas id="canvas"></canvas>
        <div id="playhead" class="playhead"></div>
      </div>
    </section>

  <div class="hidden" aria-hidden="true">
    <button id="demoBtn"></button>
    <button id="jsonBtn"></button>
    <button id="csvBtn"></button>
    <button id="similarityBtn"></button>
    <button id="pitchBtn"></button>
    <button id="testTickBtn"></button>

    <input id="tracks" type="range" min="1" max="2" step="1" value="1">
    <input id="tracksNum" type="number" value="1">

    <input id="confidence" type="range" value="0.90">
    <input id="confidenceNum" type="number" value="0.90">
    <input id="ambiguity" type="range" value="0.10">
    <input id="ambiguityNum" type="number" value="0.10">
    <input id="stability" type="range" value="2.5">
    <input id="stabilityNum" type="number" value="2.5">

    <input id="contextBeats" type="range" value="4">
    <input id="contextBeatsNum" type="number" value="4">
    <input id="eventSensitivity" type="range" value="1.00">
    <input id="eventSensitivityNum" type="number" value="1.00">
    <input id="minimumGap" type="range" value="100">
    <input id="minimumGapNum" type="number" value="100">

    <input id="stabilityGate" type="checkbox" checked>
    <input id="autoDensityFloor" type="checkbox" checked>
    <input id="stateChangeThreshold" type="range" value="0.40">
    <input id="stateChangeThresholdNum" type="number" value="0.40">
    <input id="stabilityWindow" type="range" value="185">
    <input id="stabilityWindowNum" type="number" value="185">

    <input id="visibleBeats" type="range" value="32">
    <input id="visibleBeatsNum" type="number" value="32">
    <input id="patternThreshold" type="range" value="0.78">
    <input id="patternThresholdNum" type="number" value="0.78">

    <input id="transposeInvariant" type="checkbox" checked>
    <input id="autoFollow" type="checkbox" checked>
    <input id="tickEnabled" type="checkbox" checked>
    <input id="tickVolume" type="range" value="5">
    <input id="tickVolumeNum" type="number" value="5">

    <input id="seconds" type="range" value="300">
    <input id="secondsNum" type="number" value="300">

    <span id="status"></span>
    <span id="pct"></span>
    <span id="vizTitle"></span>
    <span id="legend"></span>
    <span id="coverage"></span>
    <span id="phrases"></span>
    <span id="repeatGroups"></span>
    <span id="repeatedShare"></span>
    <span id="events"></span>
    <span id="fps"></span>

    <span id="beatConfidenceBadge"></span>
    <span id="windowBadge"></span>
    <div id="results"></div>
  </div>

  </main>

  <section id="viewerShell" class="viewerShell open empty" aria-hidden="false">
    <iframe
      id="arcViewerFrame"
      title="ArcViewer preview"
      allow="autoplay; fullscreen"
      allowfullscreen
    ></iframe>

  </section>


<script type="module">
import { encodeOggVorbis } from "./simbers-ogg-encoder.js";
import { SEQUENCE_FLOW_PATTERNS } from "./simbers-flow-library.js";

"use strict";

const $ = id => document.getElementById(id);
const els = {
  file:$("file"), demoBtn:$("demoBtn"), analyzeBtn:$("analyzeBtn"),
  featureBombs:$("featureBombs"), featureWalls:$("featureWalls"), featureArcs:$("featureArcs"),
  tracks:$("tracks"), tracksNum:$("tracksNum"),
  confidence:$("confidence"), confidenceNum:$("confidenceNum"),
  ambiguity:$("ambiguity"), ambiguityNum:$("ambiguityNum"),
  stability:$("stability"), stabilityNum:$("stabilityNum"),
  contextBeats:$("contextBeats"), contextBeatsNum:$("contextBeatsNum"),
  eventSensitivity:$("eventSensitivity"), eventSensitivityNum:$("eventSensitivityNum"),
  minimumGap:$("minimumGap"), minimumGapNum:$("minimumGapNum"),
  stabilityGate:$("stabilityGate"), autoDensityFloor:$("autoDensityFloor"),
  stateChangeThreshold:$("stateChangeThreshold"), stateChangeThresholdNum:$("stateChangeThresholdNum"),
  stabilityWindow:$("stabilityWindow"), stabilityWindowNum:$("stabilityWindowNum"),
  visibleBeats:$("visibleBeats"), visibleBeatsNum:$("visibleBeatsNum"),
  patternThreshold:$("patternThreshold"), patternThresholdNum:$("patternThresholdNum"),
  transposeInvariant:$("transposeInvariant"), autoFollow:$("autoFollow"),
  tickEnabled:$("tickEnabled"), tickVolume:$("tickVolume"), tickVolumeNum:$("tickVolumeNum"),
  testTickBtn:$("testTickBtn"),
  seconds:$("seconds"), secondsNum:$("secondsNum"),
  progress:$("progress"), status:$("status"), pct:$("pct"), mapStatus:$("mapStatus"), npsNote:$("npsNote"),
  jsonBtn:$("jsonBtn"), csvBtn:$("csvBtn"), canvas:$("canvas"),
  audio:$("audio"), playhead:$("playhead"), results:$("results"),
  similarityBtn:$("similarityBtn"), pitchBtn:$("pitchBtn"),
  vizTitle:$("vizTitle"), legend:$("legend"),
  coverage:$("coverage"), phrases:$("phrases"), repeatGroups:$("repeatGroups"),
  repeatedShare:$("repeatedShare"), events:$("events"), fps:$("fps"),
  bpmBadge:$("bpmBadge"), beatConfidenceBadge:$("beatConfidenceBadge"), windowBadge:$("windowBadge")
};

let sourceBlob = null;
let analysis = null;
let audioUrl = null;
let view = {start:0, end:1};
let viewMode = "similarity";
let followRaf = 0;
let lastFollowStart = -1;
let tickAudioContext = null;
let tickMasterGain = null;
let tickLimiter = null;
let tickNoiseBuffer = null;
let nextTickEventIndex = 0;
let lastTickPlaybackTime = 0;
let lastMapZip = null;
let lastMapZipName = "";

const uiCard = document.querySelector(".card");
const uiCluster = document.querySelector(".uiCluster");
const uiReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
let uiCenterSnapshot = null;
let uiCenterRaf = 0;
let uiCenterAnimation = null;

function scheduleUiCenterMotion(animate=true){
  cancelAnimationFrame(uiCenterRaf);
  uiCenterRaf=requestAnimationFrame(()=>{
    const rect=uiCluster.getBoundingClientRect();
    const next={top:rect.top,height:rect.height};

    if(uiCenterSnapshot && animate && !uiReducedMotion.matches){
      const deltaY=uiCenterSnapshot.top-next.top;
      const heightChanged=Math.abs(uiCenterSnapshot.height-next.height)>.5;

      if(Math.abs(deltaY)>.5 || heightChanged){
        if(uiCenterAnimation) uiCenterAnimation.cancel();
        uiCenterAnimation=uiCluster.animate([
          {
            transform:`translate3d(0,${deltaY}px,0)`,
            opacity:1,
            offset:0
          },
          {
            transform:`translate3d(0,${deltaY*.72}px,0)`,
            opacity:.68,
            offset:.26
          },
          {
            transform:`translate3d(0,${deltaY*.16}px,0)`,
            opacity:.9,
            offset:.68
          },
          {
            transform:"translate3d(0,0,0)",
            opacity:1,
            offset:1
          }
        ],{
          duration:560,
          easing:"cubic-bezier(.22,1,.36,1)"
        });
        uiCenterAnimation.addEventListener("finish",()=>{
          uiCenterAnimation=null;
        },{once:true});
      }
    }

    uiCenterSnapshot=next;
  });
}

const uiCenterResizeObserver=new ResizeObserver(()=>scheduleUiCenterMotion(true));
uiCenterResizeObserver.observe(uiCard);
uiCenterResizeObserver.observe(uiCluster);
requestAnimationFrame(()=>scheduleUiCenterMotion(false));
if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(()=>scheduleUiCenterMotion(true));
}

const ARC_VIEWER_URL = "https://cardrhyme206113.github.io/ArcViewer-simtest/";
const ARC_VIEWER_ORIGIN = new URL(ARC_VIEWER_URL).origin;
const viewerShell = document.getElementById("viewerShell");
const arcViewerFrame = document.getElementById("arcViewerFrame");
const viewerBack = document.getElementById("viewerBack");
const viewerDownload = document.getElementById("viewerDownload");
const viewerStatus = els.mapStatus;
const viewerEmptyState = document.createElement("div");
viewerEmptyState.className = "viewerEmptyState";
viewerEmptyState.textContent = "Your map preview will appear here.";
viewerShell.insertBefore(viewerEmptyState, arcViewerFrame.nextSibling);
document.querySelector(".app").appendChild(viewerShell);
viewerBack.textContent = "×";
viewerBack.setAttribute("aria-label","Clear map");
let arcViewerReady = false;
let arcViewerWaiters = [];
let arcViewerPrepared = false;
let arcViewerSession = 0;
let arcViewerLaunchQueue = Promise.resolve();

function setViewerEmpty(isEmpty,message="Your map preview will appear here."){
  viewerShell.classList.toggle("empty",isEmpty);
  viewerEmptyState.textContent=message;
  viewerShell.classList.add("open");
  viewerShell.setAttribute("aria-hidden","false");
}

function showArcViewerPanel(message="Preparing ArcViewer…"){
  viewerStatus.textContent=message;
  viewerShell.classList.add("open");
  viewerShell.setAttribute("aria-hidden","false");
  document.body.classList.add("viewer-open");
  requestAnimationFrame(()=>viewerShell.scrollIntoView({behavior:"smooth",block:"nearest"}));
}

function hideArcViewerPanel(){
  setViewerEmpty(true);
  document.body.classList.remove("viewer-open");
}

function prepareArcViewer(){
  if(arcViewerPrepared) return;
  arcViewerPrepared = true;
  arcViewerReady = false;
  arcViewerFrame.src = ARC_VIEWER_URL + "?bridge=1&v=" + Date.now();
}

function rejectArcViewerWaiters(message="ArcViewer was reset."){
  settleArcViewerWaiters(new Error(message));
}

function resetArcViewerBridge(){
  arcViewerSession++;
  arcViewerPrepared = false;
  arcViewerReady = false;
  rejectArcViewerWaiters();
  arcViewerFrame.src = "about:blank";
}

async function unloadArcViewer({collapse=false}={}){
  arcViewerSession++;
  arcViewerPrepared = false;
  arcViewerReady = false;
  rejectArcViewerWaiters("Previous ArcViewer map was unloaded.");
  if(collapse) hideArcViewerPanel();

  if(!arcViewerFrame.getAttribute("src") || arcViewerFrame.src === "about:blank"){
    arcViewerFrame.src = "about:blank";
    await new Promise(resolve=>requestAnimationFrame(resolve));
    return;
  }

  await new Promise(resolve=>{
    let finished=false;
    const done=()=>{
      if(finished) return;
      finished=true;
      arcViewerFrame.removeEventListener("load",done);
      resolve();
    };
    arcViewerFrame.addEventListener("load",done,{once:true});
    arcViewerFrame.src="about:blank";
    setTimeout(done,1200);
  });
}

function waitForArcViewerReady(timeoutMs=30000){
  if(arcViewerReady) return Promise.resolve();
  return new Promise((resolve,reject)=>{
    const waiter={resolve,reject};
    arcViewerWaiters.push(waiter);
    const timer=setTimeout(()=>{
      arcViewerWaiters=arcViewerWaiters.filter(item=>item!==waiter);
      reject(new Error("ArcViewer did not become ready."));
    },timeoutMs);
    waiter.resolve=()=>{clearTimeout(timer);resolve();};
    waiter.reject=(error)=>{clearTimeout(timer);reject(error);};
  });
}

function settleArcViewerWaiters(error=null){
  const waiters=arcViewerWaiters.splice(0);
  for(const waiter of waiters){
    if(error) waiter.reject(error);
    else waiter.resolve();
  }
}

async function launchArcViewer(blob,filename){
  const queuedLaunch = async()=>{
    if(!viewerShell.classList.contains("empty")){
      showArcViewerPanel("Unloading previous map…");
      setViewerEmpty(true,"Loading new map preview…");
      await unloadArcViewer();
    }else{
      setViewerEmpty(true,"Loading map preview…");
    }

    const session=arcViewerSession;
    showArcViewerPanel("Loading ArcViewer…");
    prepareArcViewer();
    await waitForArcViewerReady();
    if(session!==arcViewerSession) throw new Error("ArcViewer launch was replaced by a newer map.");

    const bytes=await blob.arrayBuffer();
    if(session!==arcViewerSession) throw new Error("ArcViewer launch was replaced by a newer map.");
    viewerStatus.textContent="Sending generated map…";
    arcViewerFrame.contentWindow.postMessage({
      type:"SIMPLIFIED_SABERS_LOAD_MAP",
      bytes,
      filename,
      difficulty:"ExpertPlus",
      uiOff:false
    },ARC_VIEWER_ORIGIN,[bytes]);
  };

  const result=arcViewerLaunchQueue.then(queuedLaunch,queuedLaunch);
  arcViewerLaunchQueue=result.catch(()=>{});
  return result;
}

const AXIS_DIRECTIONS={
  V:["up","down"],
  H:["left","right"],
  D1:["upLeft","downRight"],
  D2:["upRight","downLeft"]
};

const CUT={
  up:{code:0,deg:0,dx:0,dy:1},
  down:{code:1,deg:180,dx:0,dy:-1},
  left:{code:2,deg:270,dx:-1,dy:0},
  right:{code:3,deg:90,dx:1,dy:0},
  upLeft:{code:4,deg:315,dx:-.707,dy:.707},
  upRight:{code:5,deg:45,dx:.707,dy:.707},
  downLeft:{code:6,deg:225,dx:-.707,dy:-.707},
  downRight:{code:7,deg:135,dx:.707,dy:-.707}
};

function hashString(value,seed=2166136261){
  let h=seed>>>0;
  for(let i=0;i<value.length;i++){
    h^=value.charCodeAt(i);
    h=Math.imul(h,16777619);
  }
  return h>>>0;
}

async function songSeed(file){
  let h=hashString(`${file.name||"song"}|${file.size}|${file.type||""}`);
  const head=new Uint8Array(await file.slice(0,Math.min(file.size,65536)).arrayBuffer());
  const tailStart=Math.max(0,file.size-65536);
  const tail=new Uint8Array(await file.slice(tailStart,file.size).arrayBuffer());
  for(const bytes of [head,tail]){
    for(let i=0;i<bytes.length;i+=17){
      h^=bytes[i];
      h=Math.imul(h,16777619);
    }
  }
  return h>>>0;
}

function angleDistance(a,b){return Math.abs(((a-b+540)%360)-180);}
function cloneNote(note){return [note[0],note[1],note[2]];}
function ergonomicPattern(pattern){
  const left=cloneNote(pattern.l),right=cloneNote(pattern.r);
  left[0]=clamp(left[0],0,1);right[0]=clamp(right[0],2,3);
  if(left[0]>=right[0]){left[0]=1;right[0]=2;}
  return {...pattern,l:left,r:right};
}
function directionHasWindupConflict(note,other,direction){
  const cut=CUT[direction],dx=other[0]-note[0],dy=other[1]-note[1];
  if(Math.abs(dx)<=1&&Math.abs(dy)<=1){
    if(dx>0&&cut.dx<-.15)return true;
    if(dx<0&&cut.dx>.15)return true;
    if(dy>0&&cut.dy<-.15)return true;
    if(dy<0&&cut.dy>.15)return true;
  }
  return false;
}
function candidateDirections(hand,note,other,preferredAxis){
  let candidates=Object.keys(CUT).filter(d=>!directionHasWindupConflict(note,other,d));
  if(Math.abs(other[0]-note[0])<=1)candidates=candidates.filter(d=>Math.abs(CUT[d].dx)<.95);
  const preferred=new Set(AXIS_DIRECTIONS[preferredAxis]||[]);
  candidates.sort((a,b)=>(preferred.has(a)?0:1)-(preferred.has(b)?0:1));
  return candidates.length?candidates:["down"];
}
function parityPenalty(previous,direction,time){
  const d=CUT[direction];
  if(!previous)return d.dy<-.15?0:(Math.abs(d.dx)>.9?2.2:1.2);
  const dt=Math.max(.05,time-previous.time),expected=(CUT[previous.direction].deg+180)%360,error=angleDistance(d.deg,expected);
  let score=error/30;if(direction===previous.direction)score+=7;
  if(dt<.34&&error>90)score+=12;else if(dt<.55&&error>135)score+=7;
  return score;
}
function handComfortPenalty(hand,note,direction){
  const d=CUT[direction];let score=0;
  if(hand==="left"&&d.dx>.15)score+=1.8+1.1*d.dx;
  if(hand==="right"&&d.dx<-.15)score+=1.8+1.1*Math.abs(d.dx);
  if(Math.abs(d.dx)>.95)score+=1.25;
  if(note[1]===2&&d.dy>.15)score+=1.1;
  if(note[1]===0&&d.dy<-.15)score+=.55;
  return score;
}
function travelPenalty(previous,note,direction){
  if(!previous)return 0;
  const d=CUT[direction],p=CUT[previous.direction];
  const previousEndX=previous.column+p.dx*.55,previousEndY=previous.row+p.dy*.55;
  const currentStartX=note[0]-d.dx*.55,currentStartY=note[1]-d.dy*.55;
  return Math.hypot(currentStartX-previousEndX,currentStartY-previousEndY)*.30;
}
function pairComfortPenalty(leftNote,rightNote,leftDir,rightDir){
  const l=CUT[leftDir],r=CUT[rightDir],separation=rightNote[0]-leftNote[0];let score=0;
  if(directionHasWindupConflict(leftNote,rightNote,leftDir))return 1e6;
  if(directionHasWindupConflict(rightNote,leftNote,rightDir))return 1e6;
  if(l.dx>.15&&r.dx<-.15)score+=8;
  score+=Math.abs(l.dy-r.dy)*1.7+Math.abs(l.dx+r.dx)*.65;
  const lEnd=[leftNote[0]+l.dx*.72,leftNote[1]+l.dy*.72],rEnd=[rightNote[0]+r.dx*.72,rightNote[1]+r.dy*.72];
  const endDistance=Math.hypot(lEnd[0]-rEnd[0],lEnd[1]-rEnd[1]);if(endDistance<.72)score+=(.72-endDistance)*14;
  if(separation<=1&&(Math.abs(l.dx)>.7||Math.abs(r.dx)>.7))score+=5;
  return score;
}
function chooseDirections(
  pattern,
  previous,
  eventSeed,
  time,
  boundaryTargets=null
){
  const safePattern=ergonomicPattern(pattern);
  let leftOptions=candidateDirections(
    "left",
    safePattern.l,
    safePattern.r,
    safePattern.l[2]
  );
  let rightOptions=candidateDirections(
    "right",
    safePattern.r,
    safePattern.l,
    safePattern.r[2]
  );

  if(boundaryTargets?.left){
    leftOptions=[boundaryTargets.left];
  }
  if(boundaryTargets?.right){
    rightOptions=[boundaryTargets.right];
  }

  let best=null;
  for(const leftDirection of leftOptions){
    for(const rightDirection of rightOptions){
      let score=
        parityPenalty(previous.left,leftDirection,time)+
        parityPenalty(previous.right,rightDirection,time)+
        handComfortPenalty("left",safePattern.l,leftDirection)+
        handComfortPenalty("right",safePattern.r,rightDirection)+
        travelPenalty(previous.left,safePattern.l,leftDirection)+
        travelPenalty(previous.right,safePattern.r,rightDirection)+
        pairComfortPenalty(
          safePattern.l,
          safePattern.r,
          leftDirection,
          rightDirection
        )+
        boundaryTargetPenalty(
          boundaryTargets?.left,
          leftDirection
        )+
        boundaryTargetPenalty(
          boundaryTargets?.right,
          rightDirection
        );

      score+=(
        hashString(
          `${eventSeed}|${leftDirection}|${rightDirection}`
        )%1000
      )/1e6;

      if(!best||score<best.score){
        best={
          pattern:safePattern,
          leftDirection,
          rightDirection,
          score
        };
      }
    }
  }
  return best;
}

const OPPOSITE_DIRECTION={
  up:"down",
  down:"up",
  left:"right",
  right:"left",
  upLeft:"downRight",
  upRight:"downLeft",
  downLeft:"upRight",
  downRight:"upLeft"
};

function oppositeDirection(direction){
  return OPPOSITE_DIRECTION[direction]||"down";
}

function boundaryTargetPenalty(target,direction){
  if(!target)return 0;
  const error=angleDistance(CUT[target].deg,CUT[direction].deg);
  return direction===target?-8:18+error/4;
}

function normalFallbackForCompound(pattern,seed,config,cluster,index){
  const pool=FLOW_PATTERNS.filter(
    candidate=>candidate.difficulty===pattern.difficulty
  );
  return pool[
    hashString(
      `${seed}|${config.id}|${cluster}|${index}|compound-fallback`
    )%pool.length
  ];
}

function compoundFlowWindow(segments,index,pattern,duration){
  const span=Math.max(1,pattern.beatSpan||1);
  const endSegment=segments[index+span];
  if(!endSegment)return null;

  const start=segments[index].start;
  const end=Math.min(duration-.02,endSegment.start);
  const total=end-start;
  if(total<=0)return null;

  const spacing=total/pattern.steps.length;
  // Do not squeeze dense explicit streams into unreadably tiny gaps.
  if(spacing<.055)return null;

  return {start,end,total,spacing,span};
}

function explicitHandStep(steps,key,fromEnd=false){
  if(fromEnd){
    for(let i=steps.length-1;i>=0;i--){
      if(steps[i][key])return {note:steps[i][key],index:i};
    }
    return null;
  }

  for(let i=0;i<steps.length;i++){
    if(steps[i][key])return {note:steps[i][key],index:i};
  }
  return null;
}

function retunePreviousForCompound(
  generatedNotes,
  previous,
  steps,
  startTime
){
  const hands=[
    {key:"left",type:0,step:explicitHandStep(steps,"l")},
    {key:"right",type:1,step:explicitHandStep(steps,"r")}
  ];

  for(const hand of hands){
    if(!hand.step)continue;
    const target=oppositeDirection(hand.step.note[2]);

    for(let i=generatedNotes.length-1;i>=0;i--){
      const note=generatedNotes[i];
      if(note.type!==hand.type||note.time>=startTime-.0001)continue;
      if(note.compoundFlow)break;

      note.cutDirection=CUT[target].code;
      if(previous[hand.key])previous[hand.key].direction=target;
      break;
    }
  }
}
